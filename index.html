<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Basic Edit - An LLM-optimized visual JSON layout editor for MoErgo keyboards">
    <title>Basic Edit | Keyboard Layout Editor</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { moergo: { 900: '#0f172a', 800: '#1e293b', 700: '#334155', active: '#0ea5e9' } },
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
                } 
            }
        }
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #0b1120; color: #f8fafc; overflow: hidden; }
        .p-key { 
            position: absolute; width: 62px; height: 62px; border-radius: 8px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1); user-select: none; 
            border: 1px solid #334155; background-color: #1e293b; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
            padding: 4px; text-align: center; overflow: hidden; 
            will-change: transform, scale, translate, box-shadow;
        }
        /* FIX: Replaced 'transform: scale' with independent 'scale' property */
        .p-key:active { scale: 0.96; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .p-key:hover { filter: brightness(1.2); border-color: #64748b; z-index: 5; }
        
        /* FIX: Replaced 'transform: translateY' with independent 'translate' property */
        .p-key.selected { 
            border-color: #0ea5e9 !important; 
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.25), inset 0 1px 0 rgba(255,255,255,0.2) !important; 
            z-index: 10; translate: 0 -2px; background-color: #0f172a;
        }
        .p-key.trans { opacity: 0.5; border-style: dashed; }
        .p-key.dead { background-color: #0f172a; border-color: #1e293b; opacity: 0.3; }
        .text-clamp { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .text-fit-md { font-size: 11px; font-weight: 600; line-height: 1.2; word-break: break-word; white-space: pre-wrap; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="antialiased h-screen w-screen flex dark">
    <div id="root" class="h-full w-full flex relative"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, memo } = React;

        /* ==========================================================================
           LLM CONTEXT & REFERENCE SCHEMAS (DO NOT REMOVE)
           This section serves as the prompt-context source of truth for AI editors.
           ========================================================================== */

        /**
         * @typedef {Object} KeyGeo
         * @property {number} x - Horizontal offset in pixels
         * @property {number} y - Vertical offset in pixels
         * @property {number} [r] - Key rotation angle in degrees
         * @property {string} [o] - Origin coordinate anchor shift for proper rotation symmetry
         */

        /**
         * @typedef {Object} ZmkBindingNode
         * @property {string} value - The primary ZMK execution code behavior (e.g., "&kp", "&mo", "&trans")
         * @property {Array<ZmkBindingNode|string|number>} params - Nested parameters passed directly to the token behavior
         * @property {Object} [decoration] - Custom presentation configurations mapping back to UI rendering engines
         * @property {string} [decoration.label] - Text override string displaying directly on physical matrix layout
         * @property {string} [decoration.background] - Background hexadecimal color code string
         */

        /**
         * @typedef {Object} MoergoLayoutEditorSchema
         * @property {string} keyboard - Target hardware model framework registration (e.g., "glove80", "go60")
         * @property {Array<string>} layer_names - Indexed tracking descriptors identifying keyboard configurations
         * @property {Array<Array<ZmkBindingNode>>} layers - Direct multi-dimensional array mapping layers to key positions
         * @property {Array<Object>} macros - Registered global sequence strings mapping macro injection objects
         * @property {Array<Object>} combos - Advanced multi-press triggers capturing positional chord interactions
         * @property {Array<Object>} holdTaps - Dynamic time-dependent interaction definitions tuning positional taps
         * @property {Array<Object>} modMorphs - Shift-dependent dual-action definitions
         * @property {Array<Object>} tapDances - Sequential multi-tap behavior definitions
         */

        // --- 1. HARDWARE GEOMETRY REPOSITORIES ---
        const GLOVE80_GEO = [
            {x:0,y:35},{x:70,y:35},{x:140,y:0},{x:210,y:0},{x:280,y:0},{x:910,y:0},{x:980,y:0},{x:1050,y:0},{x:1120,y:35},{x:1190,y:35},
            {x:0,y:105},{x:70,y:105},{x:140,y:70},{x:210,y:70},{x:280,y:70},{x:350,y:70},{x:840,y:70},{x:910,y:70},{x:980,y:70},{x:1050,y:70},{x:1120,y:105},{x:1190,y:105},
            {x:0,y:175},{x:70,y:175},{x:140,y:140},{x:210,y:140},{x:280,y:140},{x:350,y:140},{x:840,y:140},{x:910,y:140},{x:980,y:140},{x:1050,y:140},{x:1120,y:175},{x:1190,y:175},
            {x:0,y:245},{x:70,y:245},{x:140,y:210},{x:210,y:210},{x:280,y:210},{x:350,y:210},{x:840,y:210},{x:910,y:210},{x:980,y:210},{x:1050,y:210},{x:1120,y:245},{x:1190,y:245},
            {x:0,y:315},{x:70,y:315},{x:140,y:280},{x:210,y:280},{x:280,y:280},{x:350,y:280},
            {x:448,y:280,r:20,o:"-168px 0px"},{x:546,y:231,r:30,o:"-266px 0px"},{x:707,y:105,r:45,o:"-427px 0px"},{x:490,y:105,r:-45,o:"490px 0px"},{x:651,y:231,r:-30,o:"329px 0px"},{x:749,y:280,r:-20,o:"231px 0px"},
            {x:840,y:280},{x:910,y:280},{x:980,y:280},{x:1050,y:280},{x:1120,y:315},{x:1190,y:315},
            {x:0,y:385},{x:70,y:385},{x:140,y:350},{x:210,y:350},{x:280,y:350},
            {x:371,y:378,r:15,o:"-91px 0px"},{x:462,y:350,r:25,o:"-182px 0px"},{x:630,y:224,r:45,o:"-350px 0px"},{x:560,y:224,r:-45,o:"420px 0px"},{x:728,y:350,r:-25,o:"252px 0px"},{x:819,y:378,r:-15,o:"161px 0px"},
            {x:910,y:350},{x:980,y:350},{x:1050,y:350},{x:1120,y:385},{x:1190,y:385}
        ];

        const GO60_GEO = [
            {x:0,y:35},{x:70,y:35},{x:140,y:0},{x:210,y:0},{x:280,y:0},{x:350,y:0},{x:805,y:0},{x:875,y:0},{x:945,y:0},{x:1015,y:0},{x:1085,y:35},{x:1155,y:35},
            {x:0,y:105},{x:70,y:105},{x:140,y:70},{x:210,y:70},{x:280,y:70},{x:350,y:70},{x:805,y:70},{x:875,y:70},{x:945,y:70},{x:1015,y:70},{x:1085,y:105},{x:1155,y:105},
            {x:0,y:175},{x:70,y:175},{x:140,y:140},{x:210,y:140},{x:280,y:140},{x:350,y:140},{x:805,y:140},{x:875,y:140},{x:945,y:140},{x:1015,y:140},{x:1085,y:175},{x:1155,y:175},
            {x:0,y:245},{x:70,y:245},{x:140,y:210},{x:210,y:210},{x:280,y:210},{x:350,y:210},{x:805,y:210},{x:875,y:210},{x:945,y:210},{x:1015,y:210},{x:1085,y:245},{x:1155,y:245},
            {x:140,y:280},{x:210,y:280},{x:280,y:280},{x:875,y:280},{x:945,y:280},{x:1015,y:280},
            {x:364,y:287,r:12.5,o:"0px 0px"},{x:448,y:308,r:25,o:"0px 0px"},{x:525,y:346.5,r:37,o:"0px 0px"},
            {x:640.5,y:385,r:-37,o:"0px 0px"},{x:710.5,y:336,r:-25,o:"0px 0px"},{x:791,y:301,r:-12.5,o:"0px 0px"}
        ];

        // --- 2. PARSERS & STRING TRANSLATION MAPS ---
        const ZMK_KEYCODE_MAP = {
            LSHFT:'Shift', LCTRL:'Ctrl', LALT:'Alt', LGUI:'GUI',
            RSHFT:'Shift', RCTRL:'Ctrl', RALT:'Alt', RGUI:'GUI',
            BSPC:'Bksp', RET:'Enter', PG_DN:'PgDn', PG_UP:'PgUp',
            UP:'↑', DOWN:'↓', LEFT:'←', RIGHT:'→',
            MINUS:'-', EQUAL:'=', GRAVE:'`', BSLH:'\\',
            SEMI:';', SQT:"'", FSLH:'/', LBKT:'[', RBKT:']',
            COMMA:',', DOT:'.', SPACE:'␣'
        };

        const extractParamString = (paramObj) => {
            if (!paramObj) return 'none';
            if (typeof paramObj === 'string' || typeof paramObj === 'number') return String(paramObj);
            if (paramObj.value && paramObj.params?.length > 0) {
                return `${paramObj.value}(${extractParamString(paramObj.params[0])})`;
            }
            return String(paramObj.value || 'none');
        };

        const getContrastColor = (hexcolor) => {
            if (!hexcolor) return '#f8fafc'; 
            let cleanHex = hexcolor.replace("#", ""); 
            if (cleanHex.length === 3) cleanHex = cleanHex.split('').map(c => c+c).join('');
            const r = parseInt(cleanHex.substr(0,2),16); 
            const g = parseInt(cleanHex.substr(2,2),16); 
            const b = parseInt(cleanHex.substr(4,2),16);
            return (((r*299)+(g*587)+(b*114))/1000 >= 128) ? '#0f172a' : '#ffffff';
        };

        const formatKeycode = (val) => {
            if (!val || val === 'none') return '';
            const normalized = val.toUpperCase();
            if (ZMK_KEYCODE_MAP[normalized]) return ZMK_KEYCODE_MAP[normalized];
            if (val.length === 2 && val.startsWith('N') && '0123456789'.includes(val[1])) return val[1];
            if (val.length > 1) return val.charAt(0).toUpperCase() + val.slice(1).toLowerCase();
            return val;
        };

        const generateAutoLabel = (binding) => {
            if (!binding || binding.value === '&none') return '';
            if (binding.value === '&trans') return '▽';
            if (binding.decoration?.label) return binding.decoration.label;

            if (binding.value === '&kp' && binding.params?.length > 0) {
                let val = binding.params[0].value;
                if (typeof val === 'string' && val.length === 2 && val.endsWith('S') && binding.params[0].params) {
                    return '⇧' + (binding.params[0].params[0]?.value || '');
                }
                return formatKeycode(val);
            }

            if (binding.value === '&mo' || binding.value === '&tog') {
                return `L${extractParamString(binding.params[0])}`;
            }

            if (binding.value === '&lt' || binding.value === '&mt' || binding.value.startsWith('&ht_')) {
                const holdRaw = extractParamString(binding.params[0]);
                const tapRaw = extractParamString(binding.params[1]);
                const hLabel = binding.value === '&lt' ? `L${holdRaw}` : formatKeycode(holdRaw);
                const tLabel = formatKeycode(tapRaw);
                return `${hLabel}\n${tLabel}`;
            }

            if (binding.value.startsWith('&ht_auto_')) return binding.value.split('_').pop(); 
            return binding.value.replace('&', '');
        };

        // --- 3. COMPONENTS (ISOLATED & MEMOIZED) ---
        const KeyComponent = memo(({ index, geo, binding, baseBinding, isSelected, onSelect }) => {
            const isTrans = binding.value === '&trans';
            const isDead = binding.value === '&none' || binding.value === 'none';
            const labelText = isTrans && baseBinding ? generateAutoLabel(baseBinding) : generateAutoLabel(binding);
            
            // FIX: Replaced 'transform' with independent 'rotate' property
            const keyStyle = { 
                left: `${geo.x}px`, 
                top: `${geo.y}px`, 
                rotate: geo.r ? `${geo.r}deg` : '0deg', 
                transformOrigin: geo.o || 'center' 
            };
            if (!isTrans && binding.decoration?.background) {
                keyStyle.backgroundColor = binding.decoration.background;
                keyStyle.color = binding.decoration.color || getContrastColor(binding.decoration.background);
            }

            return (
                <div 
                    className={`p-key ${isSelected ? 'selected' : ''} ${isTrans ? 'trans' : ''} ${isDead ? 'dead' : ''}`} 
                    style={keyStyle} 
                    onClick={() => onSelect(index)}
                    role="button"
                    tabIndex={0}
                >
                    <span className="text-fit-md text-clamp">{labelText}</span>
                </div>
            );
        }, (prev, next) => (
            prev.isSelected === next.isSelected &&
            prev.binding === next.binding &&
            prev.baseBinding === next.baseBinding &&
            prev.geo === next.geo
        ));

        const KeyboardContainer = ({ keyboardGeo, activeLayerBindings, baseLayerBindings, selectedKey, onSelectKey }) => (
            <div className="relative w-[1260px] h-[450px] scale-[0.65] md:scale-[0.70] xl:scale-[0.80] origin-center transition-transform mt-10">
                {keyboardGeo.map((geo, index) => (
                    <KeyComponent 
                        key={`matrix-key-${index}`} 
                        index={index} 
                        geo={geo} 
                        binding={activeLayerBindings[index] || { value: '&none', params: [] }} 
                        baseBinding={baseLayerBindings?.[index]} 
                        isSelected={selectedKey === index} 
                        onSelect={onSelectKey} 
                    />
                ))}
            </div>
        );

        const DockedInspector = ({ config, activeLayer, selectedKey, setSelectedKey, updateConfig }) => {
            const [view, setView] = useState('key'); 
            const [jsonStr, setJsonStr] = useState("");
            const [error, setError] = useState("");

            useEffect(() => { if (selectedKey !== null) setView('key'); }, [selectedKey]);

            useEffect(() => {
                setError("");
                if (view === 'key' && selectedKey !== null) {
                    setJsonStr(JSON.stringify(config.layers[activeLayer][selectedKey], null, 2));
                } else if (view !== 'key') {
                    setJsonStr(JSON.stringify(config[view] || [], null, 2));
                }
            }, [view, selectedKey, activeLayer, config]);

            const handleSave = () => {
                try {
                    const parsed = JSON.parse(jsonStr);
                    const newConfig = typeof structuredClone === "function" ? structuredClone(config) : JSON.parse(JSON.stringify(config)); 
                    newConfig.date = Math.floor(Date.now() / 1000);
                    
                    if (view === 'key') {
                        // Allow missing params specifically for parameterless bindings like &none
                        if (!parsed.value || (parsed.value !== '&none' && !parsed.params)) {
                            throw new Error("Binding structure validation failed. Missing 'value' or 'params'.");
                        }
                        newConfig.layers[activeLayer][selectedKey] = parsed;
                    } else {
                        if (!Array.isArray(parsed)) throw new Error(`Root updates for ${view} must be formatted as an array.`);
                        if (parsed.length > 0) {
                            newConfig[view] = parsed;
                        } else {
                            delete newConfig[view];
                        }
                    }
                    
                    updateConfig(newConfig);
                    setError("");
                } catch (err) {
                    setError(err.message);
                }
            };

            return (
                <div className="w-[340px] bg-slate-900 border-l border-slate-800 flex flex-col shrink-0 overflow-hidden shadow-2xl">
                    <div className="flex text-xs font-semibold bg-slate-950 border-b border-slate-800 overflow-x-auto hide-scrollbar">
                        {['key', 'macros', 'combos', 'holdTaps', 'modMorphs', 'tapDances'].map(t => (
                            <button key={t} onClick={() => { setView(t); setSelectedKey(null); }}
                                className={`flex-1 min-w-[75px] py-3 text-center capitalize transition-colors focus:outline-none ${view === t ? 'text-sky-400 border-b-2 border-sky-400 bg-slate-900' : 'text-slate-500 hover:text-slate-300'}`}>
                                {t}
                            </button>
                        ))}
                    </div>

                    <div className="p-4 flex-1 flex flex-col overflow-y-auto">
                        <div className="mb-2 flex justify-between items-center h-6">
                            <h3 className="font-bold text-sm text-white">
                                {view === 'key' ? (selectedKey !== null ? `Layer ${activeLayer} : Key ${selectedKey}` : 'No Key Selected') : `Global ${view}`}
                            </h3>
                            {view === 'key' && selectedKey !== null && (
                                <button onClick={() => setSelectedKey(null)} className="text-slate-400 hover:text-white text-xs bg-slate-800 px-2 py-1 rounded transition-colors">Deselect</button>
                            )}
                        </div>

                        {(view !== 'key' || selectedKey !== null) ? (
                            <div className="flex flex-col flex-1">
                                <p className="text-xs text-slate-400 mb-3">
                                    {view === 'key' ? "Modify parsing AST directly." : `Modify structural root sequence for ${view}.`}
                                </p>
                                <textarea 
                                    className={`flex-1 w-full bg-[#0a0a0a] text-emerald-400 font-mono text-xs p-3 rounded border outline-none resize-none mb-3 min-h-[300px] transition-colors ${error ? 'border-red-500 focus:border-red-400' : 'border-slate-700 focus:border-sky-500'}`}
                                    value={jsonStr} 
                                    onChange={(e) => setJsonStr(e.target.value)}
                                    onKeyDown={(e) => {
                                        if (e.key === 'Tab') {
                                            e.preventDefault();
                                            const start = e.target.selectionStart;
                                            const end = e.target.selectionEnd;
                                            const newVal = jsonStr.substring(0, start) + "  " + jsonStr.substring(end);
                                            setJsonStr(newVal);
                                            setTimeout(() => { e.target.selectionStart = e.target.selectionEnd = start + 2; }, 0);
                                        }
                                    }}
                                    spellCheck="false"
                                />
                                {error && <div className="text-red-400 text-xs mb-3 p-3 bg-red-950 border border-red-900/50 rounded">{error}</div>}
                                <button onClick={handleSave} className="w-full bg-sky-600 hover:bg-sky-500 text-white font-bold py-3 rounded transition-colors text-sm shadow">
                                    Save {view === 'key' ? 'Binding' : view}
                                </button>
                            </div>
                        ) : (
                            <div className="flex-1 flex items-center justify-center text-slate-500 text-sm italic text-center p-4 border border-dashed border-slate-800 rounded">
                                Select a physical key on the board to edit its binding properties.
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- 4. ENGINE MASTER CONTROLLER ---
        const App = () => {
            const [config, setConfig] = useState(null);
            const [activeLayer, setActiveLayer] = useState(0);
            const [selectedKey, setSelectedKey] = useState(null);
            const [fileError, setFileError] = useState("");

            useEffect(() => {
                const handleBeforeUnload = (e) => {
                    if (config) {
                        e.preventDefault();
                        e.returnValue = ''; 
                    }
                };
                window.addEventListener('beforeunload', handleBeforeUnload);
                return () => window.removeEventListener('beforeunload', handleBeforeUnload);
            }, [config]);

            const keyboardGeo = useMemo(() => {
                if (!config) return [];
                if (config.layout?.keys) return config.layout.keys;
                if (config.keyboard?.toLowerCase() === 'go60') return GO60_GEO;
                return GLOVE80_GEO; 
            }, [config]);

            const handleSelectKey = useCallback((index) => {
                setSelectedKey(index);
            }, []);

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setFileError("");
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        let parsed = JSON.parse(event.target.result);
                        parsed = parsed.keymap !== undefined ? parsed.keymap : parsed;
                        
                        if (!parsed.layers || !Array.isArray(parsed.layers)) {
                            throw new Error("Invalid schema tracking parameters: Missing layout 'layers' matrix map.");
                        }
                        
                        setConfig(parsed); 
                        setActiveLayer(0); 
                        setSelectedKey(null);
                    } catch (err) { 
                        setFileError(err.message || "Invalid JSON structure file targeting layout schemas."); 
                    }
                };
                reader.readAsText(file);
                e.target.value = '';
            };

            const handleExport = () => {
                if (!config) return;
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(config, null, 2));
                const anchor = document.createElement('a');
                anchor.href = dataStr; 
                anchor.download = `layout_${config.keyboard || 'custom'}_${Math.floor(Date.now() / 1000)}.json`; 
                document.body.appendChild(anchor);
                anchor.click();
                document.body.removeChild(anchor);
            };

            return (
                <div className="flex h-full w-full font-sans">
                    <div className="w-64 bg-slate-900 border-r border-slate-800 flex flex-col shrink-0 p-5 gap-6 z-20">
                        <div>
                            <h1 className="text-xl font-bold text-white mb-1 flex items-center gap-2">Basic Edit</h1>
                            <p className="text-xs text-slate-500 mb-5">Ergonomic ZMK Layout Visualizer</p>
                            <label className="block w-full bg-slate-800 border border-slate-700 hover:border-sky-500 text-slate-200 text-center py-2.5 rounded cursor-pointer transition-colors text-sm font-semibold shadow">
                                Load JSON Layout
                                <input type="file" accept=".json" className="hidden" onChange={handleFileUpload} />
                            </label>
                            {fileError && <p className="mt-2 text-xs text-red-400 bg-red-950/50 p-2 border border-red-900/30 rounded">{fileError}</p>}
                        </div>

                        {config && (
                            <div className="flex-1 flex flex-col gap-6">
                                <div className="space-y-1.5 text-xs text-slate-400 bg-slate-800/40 border border-slate-800 p-4 rounded shadow-inner">
                                    <div className="flex justify-between items-center">
                                        <span>Target Form:</span> 
                                        <span className="text-white uppercase font-mono bg-slate-700 px-1.5 py-0.5 rounded">{config.keyboard || 'Custom'}</span>
                                    </div>
                                    <div className="flex justify-between items-center">
                                        <span>Total Keys:</span> 
                                        <span className="text-white font-mono">{keyboardGeo.length}</span>
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-2">Active Layer</label>
                                    <select className="w-full bg-slate-950 border border-slate-700 text-white text-sm rounded focus:ring-2 focus:ring-sky-500 p-2.5 outline-none cursor-pointer appearance-none"
                                        value={activeLayer} onChange={(e) => { setActiveLayer(parseInt(e.target.value, 10)); setSelectedKey(null); }}>
                                        {config.layer_names?.map((name, i) => <option key={i} value={i}>{i} : {name}</option>) || config.layers.map((_, i) => <option key={i} value={i}>Layer {i}</option>)}
                                    </select>
                                </div>

                                <button onClick={handleExport} className="w-full mt-auto bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded text-sm transition-all shadow focus:ring-2 focus:ring-emerald-400">
                                    Export Configuration
                                </button>
                            </div>
                        )}
                    </div>

                    <div className="flex-1 flex items-center justify-center bg-[#0b1120] overflow-hidden relative z-10">
                        {!config ? (
                            <div className="text-slate-500 flex flex-col items-center gap-2">
                                <span>Upload a configuration file matching the MoErgo layout schema.</span>
                            </div>
                        ) : (
                            <KeyboardContainer 
                                keyboardGeo={keyboardGeo} activeLayerBindings={config.layers[activeLayer]} baseLayerBindings={config.layers[0]}
                                selectedKey={selectedKey} onSelectKey={handleSelectKey}
                            />
                        )}
                    </div>

                    {config && (
                        <DockedInspector 
                            config={config} activeLayer={activeLayer} 
                            selectedKey={selectedKey} setSelectedKey={setSelectedKey} updateConfig={setConfig} 
                        />
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
