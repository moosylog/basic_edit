<!DOCTYPE html>
<html lang="en" class="oled">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLIDE — Graphical Layout & Intent Definition Editor</title>
   
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
   
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        app: {
                            base: 'var(--bg-base)', surface: 'var(--bg-surface)', panel: 'var(--bg-panel)', card: 'var(--bg-card)',
                            border: 'var(--border-subtle)', borderHighlight: 'var(--border-highlight)',
                            text: 'var(--text-main)', textMuted: 'var(--text-muted)',
                            accent: 'var(--accent-primary)', accentHover: 'var(--accent-hover)', accentGhost: 'var(--accent-ghost)'
                        }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    transitionTimingFunction: { 'premium': 'cubic-bezier(0.4, 0, 0.2, 1)' }
                }
            }
        }
    </script>
   
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
   
    <style>
        :root {
            --bg-base: #f3f4f6; --bg-surface: #ffffff; --bg-panel: #e5e7eb; --bg-card: #f9fafb;
            --border-subtle: rgba(0,0,0,0.1); --border-highlight: rgba(0,0,0,0.2);
            --text-main: #111827; --text-muted: #6b7280;
            --accent-primary: #e55f2e; --accent-hover: #c9531f; --accent-ghost: rgba(229, 95, 46, 0.1);
            --key-grad-top: #ffffff; --key-grad-bot: #e5e7eb;
            --key-border: #d1d5db; --key-shadow: rgba(0,0,0,0.15); --canvas-dot: rgba(0,0,0,0.1);
        }
       
        .dark {
            --bg-base: #111111; --bg-surface: #1a1a1a; --bg-panel: #222222; --bg-card: #2a2a2a;
            --border-subtle: rgba(255,255,255,0.1); --border-highlight: rgba(255,255,255,0.2);
            --text-main: #ffffff; --text-muted: #9ca3af;
            --accent-primary: #e55f2e; --accent-hover: #c9531f; --accent-ghost: rgba(229, 95, 46, 0.15);
            --key-grad-top: #333333; --key-grad-bot: #222222;
            --key-border: #444444; --key-shadow: rgba(0,0,0,0.5); --canvas-dot: rgba(255,255,255,0.08);
        }

        .oled {
            --bg-base: #000000; --bg-surface: #050505; --bg-panel: #0a0a0a; --bg-card: #111111;
            --border-subtle: rgba(255,255,255,0.05); --border-highlight: rgba(255,255,255,0.15);
            --text-main: #ffffff; --text-muted: #6b7280;
            --accent-primary: #e55f2e; --accent-hover: #c9531f; --accent-ghost: rgba(229, 95, 46, 0.1);
            --key-grad-top: #2a2a2a; --key-grad-bot: #1e1e1e;
            --key-border: #111111; --key-shadow: rgba(0,0,0,0.6); --canvas-dot: rgba(255,255,255,0.06);
        }

        *, *::before, *::after { box-sizing: border-box; }
        body { background-color: var(--bg-base); color: var(--text-main); overflow: hidden; margin: 0; transition: background-color 0.3s ease, color 0.3s ease; }
       
        .canvas-container { background-color: var(--bg-base); background-image: radial-gradient(circle, var(--canvas-dot) 1px, transparent 1px); background-size: 32px 32px; cursor: grab; overflow: hidden; transition: background-color 0.3s ease; }
        .canvas-container:active { cursor: grabbing; }

        .p-key-outer { position: absolute; cursor: pointer; z-index: 1; user-select: none; }
        .p-key-outer.is-touchpad { cursor: not-allowed !important; }
       
        /* Award Winning Studio Spotlight Physics */
        .p-key-outer:not(.is-touchpad):hover { z-index: 10; }
        .p-key-outer.selected { z-index: 20; }
        .p-key-outer.drag-over { z-index: 25; }
       
        .p-key {
            width: 100%; height: 100%; border-radius: 6px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(180deg, var(--key-grad-top) 0%, var(--key-grad-bot) 100%);
            border: 1px solid var(--key-border);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), inset 0 -2px 0 var(--key-shadow), 0 3px 5px var(--key-shadow);
            padding: 4px; text-align: center; overflow: hidden; color: var(--text-main);
        }
        .p-key.is-round { border-radius: 50%; }
       
        .p-key:not(.is-touchpad):active { transform: scale(0.96) translateY(1px); box-shadow: inset 0 2px 4px var(--key-shadow); filter: brightness(0.9); }
       
        /* Hover: Lift and Glow */
        .p-key:not(.is-touchpad):hover {
            transform: scale(1.04) translateY(-2px);
            border-color: var(--border-highlight); filter: brightness(1.1);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), inset 0 -2px 0 var(--key-shadow), 0 8px 15px rgba(0,0,0,0.5);
        }
       
        /* Selected: Double Ring + Aura (Zero Color Clash) */
        .p-key.selected {
            border-color: var(--text-main) !important;
            box-shadow: 0 0 0 3px var(--bg-base), 0 0 0 5px var(--accent-primary), 0 10px 40px rgba(229, 95, 46, 0.4) !important;
            transform: scale(1.06) translateY(-2px);
        }
       
        .p-key.drag-source { opacity: 0.35; }
        .p-key.drag-over { box-shadow: 0 0 0 2px var(--accent-primary) !important; transform: scale(1.08); }

        .key-center { display: flex; align-items: center; justify-content: center; height: 100%; font-size: 11px; font-weight: 600; text-align: center; line-height: 1.2; word-break: break-word; color: inherit; }
        .key-dual { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 11px; font-weight: 600; color: inherit; }
        .key-shift { position: absolute; top: 4px; left: 8px; font-size: 10px; opacity: 0.85; font-weight: 600; color: inherit; }
        .key-main { position: absolute; bottom: 6px; left: 8px; font-weight: 700; font-size: 13px; color: inherit; }

        .palette-btn { min-width: calc(48px * var(--btn-scale, 1)); height: calc(48px * var(--btn-scale, 1)); background-color: var(--bg-surface); border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: calc(12px * var(--btn-scale, 1)); font-weight: 600; color: var(--text-main); cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); padding: 4px; border: 1px solid var(--border-subtle); line-height: 1.2; }
        .palette-btn .key-dual { font-size: calc(11px * var(--btn-scale, 1)); gap: calc(4px * var(--btn-scale, 1)); }
        .palette-btn:hover { transform: translateY(-1px); background-color: var(--bg-panel); border-color: var(--border-highlight); box-shadow: 0 4px 12px var(--key-shadow); }
       
        .btn-active { background-color: var(--accent-primary) !important; border-color: var(--accent-primary) !important; color: #ffffff !important; box-shadow: 0 0 12px var(--accent-ghost) !important; }
        .btn-active:hover { background-color: var(--accent-hover) !important; border-color: var(--accent-hover) !important; transform: translateY(-1px); }
        .btn-active-hollow { background-color: var(--accent-ghost) !important; border-color: var(--accent-primary) !important; color: var(--accent-primary) !important; box-shadow: 0 0 12px var(--accent-ghost) !important; }
        .btn-active-hollow:hover { background-color: var(--border-highlight) !important; transform: translateY(-1px); }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-highlight); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
</head>

        const getLogicalName = (index, kbType) => { return ((kbType || '').toLowerCase() === 'go60' ? GO60_NAMES : GLOVE80_NAMES)[index] || index; };

        const PALETTE_DATA = {

                                                {(paletteSearch.trim() ? searchAcrossAllPalette(paletteSearch) : ALL_PALETTE_SECTIONS).map((section, sIdx) => (
                                                    <div key={sIdx}>
                                                        <div className="text-app-textMuted text-[11px] font-bold mb-4 flex items-center gap-2 tracking-wide uppercase">
                                                            {paletteSearch.trim() ? <span className="text-[9px] uppercase tracking-widest text-[#fff] bg-app-accent px-2 py-0.5 rounded">{section.tabName}</span> : <svg className="w-3 h-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 15l7-7 7 7"></path></svg>}
                                                            {section.category || 'General'}
                                                        </div>
                                                        <div className="flex flex-wrap gap-2.5">
                                                            {section.items.map((item, idx) => (
                                                                <button key={idx} onClick={() => assignAction(item)} className={`palette-btn ${isItemActive(item) ? 'btn-active-hollow' : ''}`}>
                                                                    {item.top ? <div className="key-dual"><span>{item.top}</span><span>{item.bottom}</span></div> : paletteLabel(item, effectiveOs)}
                                                                </button>
                                                            ))}
                                                        </div>
                                                    </div>
                                                ))}
                                                {paletteSearch.trim() && searchAcrossAllPalette(paletteSearch).length === 0 && <div className="text-app-textMuted text-xs italic">No keys match "{paletteSearch}" anywhere.</div>}
                                            </div>
                                        </div>
                                    )}

                                    {activeVerticalTab === 'Advanced' && (
                                        <div className="flex flex-col gap-6 w-full max-w-7xl relative">
                                            <div className="sticky top-[-32px] bg-app-surface z-10 pb-4 pt-1 flex items-center gap-4 border-b border-app-borderHighlight mb-2 transition-colors">
                                                <div className="relative flex-1 max-w-md">
                                                    <svg className="w-4 h-4 absolute left-4 top-1/2 -translate-y-1/2 text-app-textMuted" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                                                    <input type="text" value={advancedSearch} onChange={(e) => setAdvancedSearch(e.target.value)} placeholder="Search custom behaviors..." className="w-full bg-app-card border border-app-borderHighlight rounded-xl pl-10 pr-10 py-2 text-sm text-app-text placeholder-app-textMuted outline-none focus:border-app-text transition-colors shadow-inner" />
                                                    {advancedSearch.trim() && <button onClick={() => setAdvancedSearch('')} className="absolute right-4 top-1/2 -translate-y-1/2 text-app-textMuted hover:text-app-text transition-colors">✕</button>}
                                                </div>
                                                <select value={advancedCategory} onChange={e => setAdvancedCategory(e.target.value)} className="bg-app-card border border-app-borderHighlight text-app-text text-sm rounded-xl px-4 py-2 outline-none shadow-sm cursor-pointer">
                                                    <option value="All">All Categories</option>
                                                    <option value="Macro">Macros</option>
                                                    <option value="Hold-Tap">Hold-Taps</option>
                                                    <option value="Tap-Dance">Tap-Dances</option>
                                                    <option value="Mod-Morph">Mod-Morphs</option>
                                                    <option value="Sticky-Key">Sticky-Keys</option>
                                                </select>
                                            </div>

                                            <div>
                                                {filteredBehaviors.length > 0 ? (
                                                    <div className="flex flex-wrap gap-2.5">
                                                        {filteredBehaviors.map((m, i) => (
                                                            <button key={i} onClick={() => assignAction(m)} className={`palette-btn !h-auto !py-2.5 !px-4 ${isItemActive(m) ? 'btn-active-hollow' : ''}`}>
                                                                <span className="text-[8px] text-app-textMuted uppercase tracking-widest mb-1 opacity-70 font-bold">{m.cat}</span>
                                                                <span className="font-mono text-xs">{m.label}</span>
                                                            </button>
                                                        ))}
                                                    </div>
                                                ) : (
                                                    <div className="text-app-textMuted text-xs italic">No advanced behaviors match your search criteria.</div>
                                                )}
                                            </div>
                                        </div>
                                    )}

                                    {activeVerticalTab === 'Lighting' && (
                                        <div className="flex flex-col gap-8 w-full text-app-text pl-2">
                                            <div className="flex flex-col gap-3">
                                                <div className="text-[11px] text-app-textMuted font-bold tracking-wide uppercase">LED View Toggle</div>
                                                <div className="h-px w-full max-w-[600px] bg-app-borderHighlight"></div>
                                                <button onClick={() => setShowLeds(!showLeds)} className={`w-8 h-8 mt-1 flex items-center justify-center rounded transition-colors border cursor-pointer ${showLeds ? 'btn-active border-none' : 'text-app-textMuted border-transparent hover:border-app-borderHighlight'}`}>
                                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>
                                                </button>
                                            </div>
                                            <div className="flex flex-col gap-3">
                                                <div className="text-[11px] text-app-textMuted font-bold tracking-wide uppercase">LED Color Palette</div>
                                                <div className="h-px w-full max-w-[600px] bg-app-borderHighlight"></div>
                                                <div className="flex items-center gap-3 mt-1 flex-wrap">
                                                    <button onClick={() => setKeyDecoration(null)} title="Turns LED OFF" className="w-6 h-6 rounded-full flex items-center justify-center text-gray-500 relative shrink-0 group">
                                                        <div className="absolute inset-0 rounded-full border-2 border-gray-500 group-hover:border-white transition-colors"></div>
                                                        <div className="absolute w-[2px] h-[120%] bg-gray-500 group-hover:bg-white transition-colors rotate-45"></div>
                                                    </button>
                                                    <div className="w-px h-6 bg-app-borderHighlight shrink-0 mx-1"></div>
                                                    {KEY_COLOR_PRESETS.map(c => <button key={c} onClick={() => setKeyDecoration(c)} className="w-5 h-5 rounded-full hover:scale-125 transition-transform" style={{backgroundColor: c}}></button>)}
                                                    {usedLayoutColors.length > 0 && <div className="w-px h-6 bg-app-borderHighlight shrink-0 mx-1"></div>}
                                                    {usedLayoutColors.map(c => <button key={c} onClick={() => setKeyDecoration(c)} className="w-5 h-5 rounded-full hover:scale-125 transition-transform" style={{backgroundColor: c}}></button>)}

                                                    <div className="flex items-center gap-2 ml-2 bg-app-card rounded-full border border-app-borderHighlight px-2 py-1 shadow-inner">
                                                        <div className="w-5 h-5 rounded-full overflow-hidden shrink-0 border border-app-borderHighlight relative hover:scale-110 transition-transform">
                                                            <input type="color" className="absolute -top-2 -left-2 w-10 h-10 cursor-pointer" value={currentLayerBindings[selectedKey]?.decoration?.background || '#ffffff'} onChange={(e) => setKeyDecoration(e.target.value)} />
                                                        </div>
                                                        <input type="text" className="w-16 bg-transparent text-[11px] font-mono text-app-textMuted outline-none uppercase" placeholder="#HEX" value={bgHexInput} onChange={(e) => setBgHexInput(e.target.value)} onBlur={applyBgHexInput} onKeyDown={e => e.key === 'Enter' && applyBgHexInput()} />
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {activeVerticalTab === 'Layer' && (
                                        <div className="flex flex-col gap-6 w-full max-w-4xl relative">
                                            {selectedKey === null && (
                                                <div className="bg-amber-500/10 border border-amber-500/20 text-amber-500/80 rounded-lg p-3 text-xs font-semibold flex items-center gap-2 mb-2">
                                                    <span>ℹ️</span> Select a key on the canvas to assign layer actions.
                                                </div>
                                            )}
                                            <div className="bg-app-card border border-app-borderHighlight p-4 rounded-xl flex items-center justify-between shadow-inner">
                                                <span className="text-xs font-bold text-app-textMuted uppercase tracking-widest pl-2">Target Layer</span>
                                                <select className="bg-app-surface border border-app-borderHighlight text-app-text text-sm rounded-lg px-4 py-2.5 outline-none w-72 shadow-sm cursor-pointer" value={targetLayerIdx} onChange={e => setTargetLayerIdx(parseInt(e.target.value))}>
                                                    {(config.layer_names || config.layers).map((n, i) => {
                                                        const dName = (typeof n === 'string' && n.trim() !== '') ? n : `Layer ${i}`;
                                                        return <option key={i} value={i}>{dName}</option>;
                                                    })}
                                                </select>
                                            </div>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-2">
                                                <div className="bg-app-panel border border-app-borderHighlight rounded-xl p-5 flex flex-col gap-3 shadow-sm hover:-translate-y-[2px] hover:shadow-xl hover:border-app-text transition-all group">
                                                    <div className="flex justify-between items-start">
                                                        <span className="text-[#b4b4ff] font-bold text-sm tracking-wide">Momentary (&mo)</span>
                                                        <button disabled={selectedKey === null} onClick={() => assignAction({ type: '&mo', param1: targetLayerIdx })} className={`px-4 py-1.5 rounded-lg text-xs font-bold transition-all disabled:opacity-50 disabled:cursor-not-allowed ${isItemActive({type: '&mo', param1: targetLayerIdx}) ? 'bg-[#b4b4ff] text-black border border-[#b4b4ff]' : 'bg-[#b4b4ff]/10 text-[#b4b4ff] hover:bg-[#b4b4ff]/20 border border-[#b4b4ff]/20'}`}>Assign</button>
                                                    </div>
                                                    <p className="text-app-textMuted text-xs leading-relaxed">Enables a layer while a key is pressed.</p>
                                                    <div className="mt-auto pt-4 border-t border-app-borderHighlight"><p className="text-[#b4b4ff]/70 text-[10px] italic leading-relaxed">💡 Tip: Assign this to "When held" alongside a tapped key to automatically create a Layer-Tap (&lt).</p></div>
                                                </div>
                                               
                                                <div className="bg-app-panel border border-app-borderHighlight rounded-xl p-5 flex flex-col gap-3 shadow-sm hover:-translate-y-[2px] hover:shadow-xl hover:border-app-text transition-all group">
                                                    <div className="flex justify-between items-start">
                                                        <span className="text-purple-400 font-bold text-sm tracking-wide">Layer-Tap (&lt)</span>
                                                        <button disabled={selectedKey === null} onClick={() => assignLayerTap(targetLayerIdx)} className={`px-4 py-1.5 rounded-lg text-xs font-bold transition-all disabled:opacity-50 disabled:cursor-not-allowed ${(parsedSlots.hold && parsedSlots.hold.value === '&mo' && String(parsedSlots.hold.params?.[0]?.value) === String(targetLayerIdx)) ? 'bg-purple-400 text-black border border-purple-400' : 'bg-purple-900/20 text-purple-400 hover:bg-purple-900/40 border border-purple-900/30'}`}>Assign</button>
                                                    </div>
                                                    <p className="text-app-textMuted text-xs leading-relaxed">Enables a layer when held, outputs key press when tapped.</p>
                                                </div>
                                               
                                                <div className="bg-app-panel border border-app-borderHighlight rounded-xl p-5 flex flex-col gap-3 shadow-sm hover:-translate-y-[2px] hover:shadow-xl hover:border-app-text transition-all group">
                                                    <div className="flex justify-between items-start">
                                                        <span className="text-amber-400 font-bold text-sm tracking-wide">Sticky (&sl)</span>
                                                        <button disabled={selectedKey === null} onClick={() => assignAction({ type: '&sl', param1: targetLayerIdx })} className={`px-4 py-1.5 rounded-lg text-xs font-bold transition-all disabled:opacity-50 disabled:cursor-not-allowed ${isItemActive({type: '&sl', param1: targetLayerIdx}) ? 'bg-amber-400 text-black border border-amber-400' : 'bg-amber-900/20 text-amber-400 hover:bg-amber-900/40 border border-amber-900/30'}`}>Assign</button>
                                                    </div>
                                                    <p className="text-app-textMuted text-xs leading-relaxed">Enables a layer until the next key press.</p>
                                                </div>

                                                <div className="bg-app-panel border border-app-borderHighlight rounded-xl p-5 flex flex-col gap-3 shadow-sm hover:-translate-y-[2px] hover:shadow-xl hover:border-app-text transition-all group">
                                                    <div className="flex justify-between items-start">
                                                        <span className="text-emerald-400 font-bold text-sm tracking-wide">Toggle (&tog)</span>
                                                        <button disabled={selectedKey === null} onClick={() => assignAction({ type: '&tog', param1: targetLayerIdx })} className={`px-4 py-1.5 rounded-lg text-xs font-bold transition-all disabled:opacity-50 disabled:cursor-not-allowed ${isItemActive({type: '&tog', param1: targetLayerIdx}) ? 'bg-emerald-400 text-black border border-emerald-400' : 'bg-emerald-900/20 text-emerald-400 hover:bg-emerald-900/40 border border-emerald-900/30'}`}>Assign</button>
                                                    </div>
                                                    <p className="text-app-textMuted text-xs leading-relaxed">Enables a layer until manually disabled.</p>
                                                </div>
                                               
                                                <div className="bg-app-panel border border-app-borderHighlight rounded-xl p-5 flex flex-col gap-3 shadow-sm hover:-translate-y-[2px] hover:shadow-xl hover:border-app-text transition-all group">
                                                    <div className="flex justify-between items-start">
                                                        <span className="text-blue-400 font-bold text-sm tracking-wide">Switch To (&to)</span>
                                                        <button disabled={selectedKey === null} onClick={() => assignAction({ type: '&to', param1: targetLayerIdx })} className={`px-4 py-1.5 rounded-lg text-xs font-bold transition-all disabled:opacity-50 disabled:cursor-not-allowed ${isItemActive({type: '&to', param1: targetLayerIdx}) ? 'bg-blue-400 text-black border border-blue-400' : 'bg-blue-900/20 text-blue-400 hover:bg-blue-900/40 border border-blue-900/30'}`}>Assign</button>
                                                    </div>
                                                    <p className="text-app-textMuted text-xs leading-relaxed">Enables a layer and disables all other layers except default.</p>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {activeVerticalTab === 'JSON' && (
                                        <div className="flex flex-col w-full h-full pb-4">
                                            <div className="flex justify-between items-center mb-3 shrink-0">
                                                <span className="text-[11px] text-app-textMuted font-bold uppercase tracking-widest">Raw JSON AST</span>
                                                <button onClick={saveCustomJson} className="btn-active-hollow text-xs font-bold px-5 py-2 rounded-lg transition-transform hover:-translate-y-px shadow-sm">Apply JSON</button>
                                            </div>
                                            <textarea className={`w-full flex-1 bg-app-card text-app-accent font-mono text-xs p-5 rounded-xl border outline-none resize-none shadow-inner transition-colors ${jsonError ? 'border-red-500' : 'border-app-borderHighlight focus:border-app-text'}`} value={jsonStr} onChange={(e) => setJsonStr(e.target.value)} spellCheck="false" />
                                            {jsonError && <div className="text-red-400 text-xs mt-3 font-semibold shrink-0">{jsonError}</div>}
                                        </div>
                                    )}
                                </div>
                            </aside>
                        )}
                    </main>

                    {showSettings && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-md" onClick={() => setShowSettings(false)}>
                            <div className="bg-app-surface border border-app-borderHighlight rounded-2xl shadow-2xl p-8 max-w-md w-full mx-4" onClick={(e) => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-xl font-bold text-app-text flex items-center gap-2"><svg className="w-6 h-6 text-app-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg> Configuration</h3>
                                    <button onClick={() => setShowSettings(false)} className="text-app-textMuted hover:text-app-text text-xl">&times;</button>
                                </div>
                                <div className="space-y-6">
                                    <div className="flex flex-col gap-2">
                                        <label className="text-[10px] uppercase font-bold tracking-widest text-app-textMuted">Color Theme</label>
                                        <div className="flex gap-2 bg-app-card p-1 rounded-xl border border-app-borderHighlight">
                                            <button onClick={() => setThemeClass('oled')} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-all ${themeClass === 'oled' ? 'bg-app-accent text-white shadow-sm' : 'text-app-textMuted hover:text-app-text'}`}>OLED Dark</button>
                                            <button onClick={() => setThemeClass('dark')} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-all ${themeClass === 'dark' ? 'bg-app-accent text-white shadow-sm' : 'text-app-textMuted hover:text-app-text'}`}>Pro Dark</button>
                                            <button onClick={() => setThemeClass('light')} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-all ${themeClass === 'light' ? 'bg-app-accent text-white shadow-sm' : 'text-app-textMuted hover:text-app-text'}`}>Light</button>
                                        </div>
                                    </div>
                                    <div className="flex flex-col gap-2">
                                        <label className="text-[10px] uppercase font-bold tracking-widest text-app-textMuted">Editor Layout Location</label>
                                        <div className="flex gap-2 bg-app-card p-1 rounded-xl border border-app-borderHighlight">
                                            <button onClick={() => setLayoutMode('bottom')} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-all ${layoutMode === 'bottom' ? 'bg-app-borderHighlight text-app-text shadow-sm' : 'text-app-textMuted hover:text-app-text'}`}>Bottom Pane</button>
                                            <button onClick={() => setLayoutMode('right')} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-all ${layoutMode === 'right' ? 'bg-app-borderHighlight text-app-text shadow-sm' : 'text-app-textMuted hover:text-app-text'}`}>Right Sidebar</button>
                                        </div>
                                    </div>
                                    <div className="flex flex-col gap-2">
                                        <label className="text-[10px] uppercase font-bold tracking-widest text-app-textMuted">Target OS (Keycaps)</label>
                                        <select value={osSetting} onChange={(e) => setOsSetting(e.target.value)} className="bg-app-card border border-app-borderHighlight text-app-text text-sm rounded-lg px-4 py-2.5 outline-none shadow-sm cursor-pointer">
                                            <option value="auto">Auto-Detect ({detectOs().toUpperCase()})</option>
                                            <option value="mac">macOS (⌘)</option><option value="win">Windows (⊞)</option><option value="linux">Linux (❖)</option>
                                        </select>
                                    </div>
                                </div>
                                <button onClick={() => setShowSettings(false)} className="mt-8 w-full btn-active font-bold py-3 rounded-xl transition-all shadow-lg hover:-translate-y-px">Done</button>
                            </div>
                        </div>
                    )}

                    {toast && (
                        <div className={`fixed bottom-8 left-1/2 -translate-x-1/2 z-50 px-6 py-3.5 rounded-full text-xs font-bold shadow-2xl border transition-all animate-bounce ${toast.kind === 'error' ? 'bg-red-950 border-red-600 text-red-200' : 'bg-app-panel border-app-borderHighlight text-app-text'}`}>
                            {toast.message}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
