    <style>
        body { background-color: #1a1a1a; color: #ffffff; overflow: hidden; margin: 0; }
       
        /* Interactive Canvas */
        .canvas-container {
            background-color: #1a1a1a;
            background-image: radial-gradient(circle, #333333 1px, transparent 1px);
            background-size: 24px 24px;
            cursor: grab; overflow: hidden;
        }
        .canvas-container:active { cursor: grabbing; }

        /* Canvas Physical Key Styling */
        .p-key {
            position: absolute; width: 62px; height: 62px; border-radius: 6px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.1s; user-select: none;
            background-color: #303030; border: 1px solid #111111;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.08), 0 2px 4px rgba(0,0,0,0.5);
            padding: 4px; text-align: center; overflow: hidden; color: #e5e5e5; z-index: 1;
        }
        .p-key:active { transform: scale(0.96) !important; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5) !important; background-color: #282828; }
        .p-key:hover { border-color: #666666; background-color: #383838; color: #ffffff; z-index: 5; }
        .p-key.selected { border-color: #e55f2e !important; color: #ffffff !important; box-shadow: 0 0 0 2px rgba(229, 95, 46, 0.8), inset 0 1px 1px rgba(255, 255, 255, 0.1) !important; z-index: 10; background-color: #4a342c; }
        .p-key:not(.selected).has-bg:hover { filter: brightness(1.2); border-color: #ffffff !important; }

        .key-center { display: flex; align-items: center; justify-content: center; height: 100%; font-size: 11px; font-weight: 600; text-align: center; line-height: 1.2; word-break: break-word; color: inherit; }
        .key-dual { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 11px; font-weight: 600; color: inherit; }
        .key-shift { position: absolute; top: 4px; left: 8px; font-size: 10px; opacity: 0.7; font-weight: 600; color: inherit; }
        .key-main { position: absolute; bottom: 6px; left: 8px; font-weight: 700; font-size: 13px; color: inherit; }

        /* Palette Button Styling (Dynamic Scale via CSS Var) */
        .palette-btn {
            min-width: calc(52px * var(--btn-scale, 1));
            height: calc(52px * var(--btn-scale, 1));
            background-color: #383838; border-radius: 6px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: calc(11px * var(--btn-scale, 1)); font-weight: 700; color: #ffffff;
            cursor: pointer; transition: background-color 0.1s;
            padding: 4px; border: 1px solid transparent; line-height: 1.2;
        }
        .palette-btn .key-dual { font-size: calc(11px * var(--btn-scale, 1)); gap: calc(4px * var(--btn-scale, 1)); }
        .palette-btn:hover { background-color: #4a4a4a; border-color: #666666; }
        .palette-tab-active { background-color: #e5e5e5; color: #000000; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5), inset 0 2px 4px rgba(255, 255, 255, 0.8); }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
    </style>

            if (val.startsWith('&mac')) return `<span class="key-center text-[11px] font-bold text-amber-400">${val.replace('&','')}</span>`;
            if (val.startsWith('&ht_auto_')) return `<span class="key-center text-[10px]">${val.split('_').pop()}</span>`;
           
            return `<span class="key-center">${val.replace('&', '')}</span>`;
        };

        const KeyComponent = memo(({ index, geo, binding, isSelected, onSelect }) => {
            const labelHtml = getBeautifulLabel(binding);
            const keyStyle = { left: `${geo.x}px`, top: `${geo.y}px`, transform: geo.r ? `rotate(${geo.r}deg)` : 'none', transformOrigin: geo.o || 'center' };
           
            const hasCustomBg = binding?.value !== '&trans' && binding?.value !== '&none' && binding?.decoration?.background;
            if (hasCustomBg) {
                keyStyle.backgroundColor = binding.decoration.background;
                keyStyle.borderColor = binding.decoration.background;
                keyStyle.color = binding.decoration.color || getContrastColor(binding.decoration.background);
            }

            return (
                <div className={`p-key ${isSelected ? 'selected' : ''} ${hasCustomBg ? 'has-bg' : ''}`} style={keyStyle} onClick={(e) => { e.stopPropagation(); onSelect(index); }}>
                    {labelHtml ? <div dangerouslySetInnerHTML={{ __html: labelHtml }} className="w-full h-full relative" /> : null}
                </div>
            );
        });

        const KeyboardContainer = ({ keyboardGeo, activeLayerBindings, selectedKey, onSelectKey }) => {
            const [pan, setPan] = useState({ x: 0, y: 0 });
            const [scale, setScale] = useState(0.8);
            const [isDragging, setIsDragging] = useState(false);
            const [dragStart, setDragStart] = useState({ x: 0, y: 0 });

            useEffect(() => { window.currentScale = scale; window.setScale = setScale; }, [scale]);

            const handleMouseDown = (e) => {
                if(e.target.closest('.p-key')) return;
                setIsDragging(true);
                setDragStart({ x: e.clientX - pan.x, y: e.clientY - pan.y });
            };
            const handleMouseMove = (e) => {
                if(!isDragging) return;
                setPan({ x: e.clientX - dragStart.x, y: e.clientY - dragStart.y });
            };
            const handleMouseUp = () => setIsDragging(false);

            return (
                <div className="canvas-container absolute inset-0 flex items-center justify-center" onMouseDown={handleMouseDown} onMouseMove={handleMouseMove} onMouseUp={handleMouseUp} onMouseLeave={handleMouseUp} onClick={() => onSelectKey(null)}>
                   
                    {/* CANVAS ZOOM OVERLAY */}
                    <div className="absolute top-6 right-6 flex items-center gap-3 bg-MoErgo-tabBg p-1.5 rounded-full px-4 border border-[#333] shadow-lg z-20">
                        <span className="text-xs text-gray-500 font-bold mr-2">CANVAS</span>
                        <button onClick={() => window.setScale(s => Math.min(s + 0.1, 2))} className="text-gray-400 hover:text-white"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4"></path></svg></button>
                        <span className="text-xs font-mono font-bold w-10 text-center">{Math.round(scale * 100)}%</span>
                        <button onClick={() => window.setScale(s => Math.max(s - 0.1, 0.4))} className="text-gray-400 hover:text-white"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M20 12H4"></path></svg></button>
                    </div>

                    <div className="relative w-[1260px] h-[450px] origin-center" style={{ transform: `translate(${pan.x}px, ${pan.y}px) scale(${scale})` }}>
                        {keyboardGeo.map((geo, index) => (
                            <KeyComponent key={`matrix-key-${index}`} index={index} geo={geo} binding={activeLayerBindings[index] || { value: '&none' }} isSelected={selectedKey === index} onSelect={onSelectKey} />
                        ))}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [config, setConfig] = useState(null);
            const [activeLayer, setActiveLayer] = useState(0);
            const [selectedKey, setSelectedKey] = useState(null);
            const [activeTab, setActiveTab] = useState('Basic');
            const [activeMenu, setActiveMenu] = useState('Keymap');
            const [paletteScale, setPaletteScale] = useState(1.0);
           
            const [jsonStr, setJsonStr] = useState("");
            const [jsonError, setJsonError] = useState("");
           
            const [undoStack, setUndoStack] = useState([]);
            const [redoStack, setRedoStack] = useState([]);

            const keyboardGeo = useMemo(() => {
                if (!config) return [];
                if (config.keyboard?.toLowerCase() === 'go60') return GO60_GEO;
                return GLOVE80_GEO;
            }, [config]);

            useEffect(() => {
                if (activeTab === 'JSON' && config && selectedKey !== null) {
                    setJsonStr(JSON.stringify(config.layers[activeLayer][selectedKey] || {value: "&none"}, null, 2));
                    setJsonError("");
                }
            }, [selectedKey, activeLayer, config, activeTab]);

            const pushHistory = useCallback((newConfig) => {
                setUndoStack(prev => [...prev.slice(-99), structuredClone(config)]);
                setRedoStack([]); setConfig(newConfig);
            }, [config]);

            const undo = () => { if (undoStack.length === 0) return; const prevConfig = undoStack[undoStack.length - 1]; setRedoStack(prev => [...prev, structuredClone(config)]); setUndoStack(prev => prev.slice(0, -1)); setConfig(prevConfig); };
            const redo = () => { if (redoStack.length === 0) return; const nextConfig = redoStack[redoStack.length - 1]; setUndoStack(prev => [...prev, structuredClone(config)]); setRedoStack(prev => prev.slice(0, -1)); setConfig(nextConfig); };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        let parsed = JSON.parse(event.target.result);
                        parsed = parsed.keymap !== undefined ? parsed.keymap : parsed;
                        setConfig(parsed); setActiveLayer(0); setSelectedKey(null); setUndoStack([]); setRedoStack([]);
                        if(window.setScale) window.setScale(0.8);
                    } catch (err) { alert("Invalid Layout File"); }
                };
                reader.readAsText(file); e.target.value = '';
            };

            const handleExport = () => {
                if (!config) return;
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(config, null, 2));
                const anchor = document.createElement('a');
                anchor.href = dataStr; anchor.download = `layout_${config.keyboard || 'custom'}.json`;
                document.body.appendChild(anchor); anchor.click(); anchor.remove();
            };

            const assignAction = (item) => {
                if (selectedKey === null || !config) return;
                const newConfig = structuredClone(config);
                let newBinding = { value: '&none' }; // Omit params for zero-param tokens

                if (item.code) {
                    newBinding = { value: '&kp', params: [{ value: item.code, params: [] }] };
                } else if (item.type) {
                    newBinding.value = item.type;
                    if (item.param1 !== undefined) {
                        newBinding.params = [{ value: item.param1, params: [] }];
                        if (item.param2 !== undefined) newBinding.params.push({ value: item.param2, params: [] });
                    }
                }

                if (newConfig.layers[activeLayer][selectedKey]?.decoration) {
                    newBinding.decoration = newConfig.layers[activeLayer][selectedKey].decoration;
                }
                newConfig.layers[activeLayer][selectedKey] = newBinding;
                pushHistory(newConfig);
            };

            const saveCustomJson = () => {
                if (selectedKey === null || !config) return;
                try {
                    const parsed = JSON.parse(jsonStr);
                    if (!parsed.value) throw new Error("Missing 'value' attribute.");
                    const newConfig = structuredClone(config);
                    newConfig.layers[activeLayer][selectedKey] = parsed;
                    pushHistory(newConfig); setJsonError("");
                } catch (err) { setJsonError(err.message); }
            };

            const SIDEBAR_ITEMS = [
                { id: 'Keymap', label: 'Keymap', icon: <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 10h2M10 10h2M14 10h2M6 14h10M18 10h.01M18 14h.01"/></svg> },
                { id: 'Backlight', label: 'Backlight', icon: <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path strokeLinecap="round" strokeLinejoin="round" d="M12 3v2m0 14v2m8-10h2M3 12h2m13.071-7.071l-1.414 1.414M6.343 17.657l-1.414 1.414M17.657 17.657l1.414 1.414M6.343 6.343L4.929 4.929M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg> },
                { id: 'Macro', label: 'Macro', icon: <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="12" cy="12" r="10"/><path strokeLinecap="round" strokeLinejoin="round" d="M8 16V8l4 5 4-5v8"/></svg> },
                { id: 'Quick Start', label: 'Quick Start', icon: <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="12" cy="12" r="10"/><path strokeLinecap="round" strokeLinejoin="round" d="M13 10V4L9 14h2v6l4-10h-2z"/></svg> }
            ];

            return (
                <div className="flex h-screen w-screen font-sans text-sm overflow-hidden">
                    <aside className="w-[260px] bg-MoErgo-sidebar border-r border-MoErgo-card flex flex-col shrink-0 py-6 px-4 z-20 h-full">
                        <div className="text-xl font-bold text-white mb-8 px-4">MoErgo Layout</div>
                        <div className="flex flex-col gap-2 flex-1 pl-2">
                            {SIDEBAR_ITEMS.map((item) => (
                                <div key={item.id} onClick={() => setActiveMenu(item.id)} className={`sidebar-item flex items-center gap-4 px-4 py-3 rounded-lg cursor-pointer font-medium transition-colors ${activeMenu === item.id ? 'bg-MoErgo-menuActiveBg text-MoErgo-menuActiveText shadow-sm' : 'text-MoErgo-textMuted hover:bg-MoErgo-cardHover'}`}>
                                    <div className={`${activeMenu === item.id ? 'text-blue-400' : 'text-gray-500'}`}>{item.icon}</div>
                                    <span className="tracking-wide text-[14px] font-semibold">{item.label}</span>
                                </div>
                            ))}
                        </div>
                        <div className="mt-auto border-t border-MoErgo-card pt-6 space-y-3">
                            <label className="block w-full bg-MoErgo-card hover:bg-MoErgo-cardHover border border-MoErgo-card text-white text-center py-3 rounded-full cursor-pointer transition-colors font-medium">Load JSON<input type="file" accept=".json" className="hidden" onChange={handleFileUpload} /></label>
                            {config && <button onClick={handleExport} className="w-full bg-MoErgo-primary hover:bg-MoErgo-primaryHover text-white font-medium py-3 rounded-full transition-colors shadow-[0_0_10px_rgba(229,95,46,0.3)]">Export Layout</button>}
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col bg-MoErgo-base relative z-10 h-full">
                        <header className="h-[76px] shrink-0 border-b border-MoErgo-card flex items-center justify-between px-8 bg-MoErgo-surface z-20">
                            <div className="flex items-center gap-4">
                                <span className="text-MoErgo-textMuted text-xs uppercase font-semibold">Layer</span>
                                <div className="flex bg-MoErgo-tabBg p-1 rounded-full">
                                    {config ? (config.layer_names || Array.from({length: config.layers.length})).map((name, i) => (
                                        <button key={i} onClick={() => { setActiveLayer(i); setSelectedKey(null); }} className={`px-5 py-1.5 rounded-full text-xs font-semibold transition-colors ${activeLayer === i ? 'palette-tab-active' : 'text-MoErgo-textMuted hover:text-white'}`}>
                                            {typeof name === 'string' ? name : `Layer ${i}`}
                                        </button>
                                    )) : (<div className="px-5 py-1.5 text-xs text-MoErgo-textMuted">No Layout</div>)}
                                </div>
                            </div>
                           
                            <div className="flex items-center gap-2">
                                <span className="text-xs text-gray-500 font-bold mr-2 tracking-widest">HISTORY</span>
                                <button onClick={undo} disabled={undoStack.length === 0} className={`p-2 rounded-full border border-MoErgo-card flex items-center gap-2 px-4 font-bold text-xs ${undoStack.length > 0 ? 'text-white bg-MoErgo-card hover:bg-MoErgo-cardHover' : 'text-MoErgo-textMuted opacity-50 cursor-not-allowed'}`} title="Undo">
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 10h10a5 5 0 015 5v1m-15-6l4-4m-4 4l4 4"></path></svg> Undo
                                </button>
                                <button onClick={redo} disabled={redoStack.length === 0} className={`p-2 rounded-full border border-MoErgo-card flex items-center gap-2 px-4 font-bold text-xs ${redoStack.length > 0 ? 'text-white bg-MoErgo-card hover:bg-MoErgo-cardHover' : 'text-MoErgo-textMuted opacity-50 cursor-not-allowed'}`} title="Redo">
                                    Redo <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 10H11a5 5 0 00-5 5v1m15-6l-4-4m4 4l-4 4"></path></svg>
                                </button>
                            </div>
                        </header>

                        <section className="flex-1 flex relative overflow-hidden">
                            {!config ? (
                                <div className="m-auto text-MoErgo-textMuted flex flex-col items-center gap-4 bg-MoErgo-panel p-8 rounded-2xl border border-MoErgo-card shadow-2xl">
                                    <span className="font-medium">Upload a MoErgo JSON layout to begin.</span>
                                </div>
                            ) : <KeyboardContainer keyboardGeo={keyboardGeo} activeLayerBindings={config.layers[activeLayer]} selectedKey={selectedKey} onSelectKey={setSelectedKey} />}
                        </section>

                        {config && (
                            <section className="flex-[0.45] min-h-[250px] max-h-[500px] shrink-0 bg-[#222222] border-t border-[#333] flex flex-col z-20 shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
                                <div className="p-4 flex items-center">
                                    <div className="bg-MoErgo-tabBg p-1.5 rounded-full inline-flex gap-2">
                                        {['Basic', 'Media', 'Macro', 'Special Keys', 'Lighting', 'Custom', 'Layer', 'JSON'].map(tab => (
                                            <button key={tab} onClick={() => setActiveTab(tab)} className={`px-5 py-1.5 rounded-full text-xs font-semibold transition-all ${activeTab === tab ? 'palette-tab-active' : 'text-gray-400 hover:text-white'}`}>
                                                {tab}
                                            </button>
                                        ))}
                                    </div>
                                   
                                    {/* PALETTE ZOOM CONTROLS */}
                                    <div className="ml-auto flex items-center gap-3 bg-MoErgo-tabBg p-1.5 rounded-full px-4 border border-[#333]">
                                        <span className="text-xs text-gray-500 font-bold mr-2 tracking-widest">PALETTE ZOOM</span>
                                        <button onClick={() => setPaletteScale(s => Math.min(s + 0.2, 2))} className="text-gray-400 hover:text-white"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4"></path></svg></button>
                                        <span className="text-xs font-mono font-bold w-10 text-center">{Math.round(paletteScale * 100)}%</span>
                                        <button onClick={() => setPaletteScale(s => Math.max(s - 0.2, 0.6))} className="text-gray-400 hover:text-white"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M20 12H4"></path></svg></button>
                                    </div>
                                </div>
                               
                                <div className="flex-1 px-6 pb-6 overflow-y-auto">
                                    {selectedKey === null ? (
                                        <div className="h-full flex items-center text-gray-500 italic">Select a key on the canvas to assign a new binding.</div>
                                    ) : (
                                        <div className="flex flex-col gap-4">
                                            {activeTab === 'Macro' ? (
                                                <div className="flex flex-wrap gap-2" style={{"--btn-scale": paletteScale}}>
                                                    {(config.macros && config.macros.length > 0) ? (
                                                        config.macros.map((m, i) => (
                                                            <button key={i} onClick={() => assignAction({ type: m.name })} className="palette-btn">
                                                                {m.name.replace('&', '')}
                                                            </button>
                                                        ))
                                                    ) : <div className="text-gray-500 text-xs">No custom macros defined in layout file.</div>}
                                                </div>
                                            ) : activeTab === 'Layer' ? (
                                                <div className="flex flex-wrap gap-2" style={{"--btn-scale": paletteScale}}>
                                                    {(config.layer_names || config.layers).map((n, i) => (
                                                        <React.Fragment key={i}>
                                                            <button onClick={() => assignAction({ type: '&mo', param1: i })} className="palette-btn text-purple-300">MO {i}</button>
                                                            <button onClick={() => assignAction({ type: '&tog', param1: i })} className="palette-btn text-emerald-300">TOG {i}</button>
                                                        </React.Fragment>
                                                    ))}
                                                </div>
                                            ) : activeTab === 'JSON' ? (
                                                <div className="flex flex-col w-full max-w-2xl">
                                                    <div className="flex justify-between items-center mb-2">
                                                        <span className="text-xs text-gray-400">Raw JSON AST (Layer {activeLayer}, Key {selectedKey})</span>
                                                        <button onClick={saveCustomJson} className="bg-MoErgo-primary text-white text-xs px-4 py-1.5 rounded hover:bg-[#c54a1f] transition-colors">Apply JSON</button>
                                                    </div>
                                                    <textarea className={`w-full bg-[#111] text-emerald-400 font-mono text-xs p-4 rounded-lg border outline-none resize-none min-h-[120px] ${jsonError ? 'border-red-500' : 'border-[#333] focus:border-gray-500'}`} value={jsonStr} onChange={(e) => setJsonStr(e.target.value)} spellCheck="false" />
                                                    {jsonError && <div className="text-red-400 text-xs mt-2">{jsonError}</div>}
                                                </div>
                                            ) : (
                                                (PALETTE_DATA[activeTab.replace(' ', '')] || PALETTE_DATA['Basic']).map((section, sIdx) => (
                                                    <div key={sIdx} className="mb-4">
                                                        {section.category && <div className="text-white text-sm font-bold flex items-center gap-2 mb-3">{section.category}</div>}
                                                        <div className="flex flex-wrap gap-2" style={{"--btn-scale": paletteScale}}>
                                                            {section.items.map((item, idx) => (
                                                                <button key={idx} onClick={() => assignAction(item)} className="palette-btn">
                                                                    {item.top ? <div className="key-dual"><span>{item.top}</span><span>{item.bottom}</span></div> : item.label}
                                                                </button>
                                                            ))}
                                                        </div>
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    )}
                                </div>
                            </section>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
