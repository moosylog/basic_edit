                // so we can update a matching decoration.label to keep the matrix label in sync.
                const oldDisplayVal = String(bindingObj.params?.[resolveParamSlots(bindingObj.value).find(s => s.type==='keycode'||s.type==='modifier')?.idx ?? 1]?.value || '');
                bindingObj.value = v;

                // Set default params based on behavior type
                const slots = resolveParamSlots(v);
                if (v === '&kp') bindingObj.params = [{value: 'A'}];
                else if (v === '&sk') bindingObj.params = [{value: 'LSHFT'}];
                else if (v === '&mt') bindingObj.params = [{value: 'LSHFT'}, {value: 'A'}];
                else if (v === '&lt') bindingObj.params = [{value: 1}, {value: 'A'}];
                else if (v === '&mo' || v === '&to' || v === '&tog' || v === '&sl') bindingObj.params = [{value: 1}];
                else if (v === '&bt') bindingObj.params = [{value: 'BT_SEL'}, {value: 0}];
                else if (ENUM_OPTIONS[BEHAVIOR_DEF[v]?.type]) {
                    const enumKey = BEHAVIOR_DEF[v].type;
                    bindingObj.params = [{value: ENUM_OPTIONS[enumKey].options[0]}];
                }
                else if (BEHAVIOR_DEF[v]?.type === 'macro-timing') bindingObj.params = [{value: 30}];
                else if (v === 'Custom') bindingObj.params = [{value: '&my_behavior'}];
                else if (customBehaviorNames.includes(v)) {
                    if (!wasCustomBehaviorName) bindingObj.params = slots.map(() => ({value: ''}));
                }
                else { delete bindingObj.params; }

                // Sync decoration.label to the new behavior's tap/keycode param if it was
                // derived from the old one. This prevents stale labels after type switches
                // (e.g. &HRM LSHFT F -> &kp A should update "F" label to "A").
                const newTapSlot = resolveParamSlots(v).find(s => s.type === 'keycode' || s.type === 'modifier');
                const newDisplayVal = newTapSlot ? String(bindingObj.params?.[newTapSlot.idx]?.value || '') : '';
                if (oldDisplayVal && newDisplayVal) syncDecorationLabel(bindingObj, oldDisplayVal, newDisplayVal);

                closePicker(); renderAll();
            });

            const paramsContainer = document.getElementById('be-params');

            // ---- Custom literal wrapper: show behavior reference name (no params UI needed) ----
            if (baseType === 'custom' && !isCustomBehaviorName) {
                let isLiteralCustomWrapper = (behaviorVal === 'Custom');
                let customVal = isLiteralCustomWrapper ? (bindingObj.params?.[0]?.value || '') : behaviorVal;
                paramsContainer.innerHTML = `
                    <div class="bg-white dark:bg-slate-800 p-6 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm dark:shadow-inner">
                        <label class="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-2">Behavior Reference</label>
                        <input type="text" id="be-custom-val" class="input-field font-mono text-[color:var(--accent)] font-bold" value="${customVal}" placeholder="&my_behavior">
                    </div>`;
                document.getElementById('be-custom-val').onchange = (e) => {
                    if (e.target.value === customVal) return;
                    pushHistory();
                    if (isLiteralCustomWrapper) { bindingObj.value = 'Custom'; bindingObj.params = [{value: e.target.value}]; }
                    else { bindingObj.value = e.target.value; }
                    renderAll();
                };
                return;
            }

            // ---- Unified param slots: render widget per slot ----
            const slots = resolveParamSlots(behaviorVal);

            if (slots.length === 0 && (bindingObj.params?.length > 0)) {
                // Fallback: behavior unknown but has params — show all as raw editable text
                (bindingObj.params || []).forEach((p, i) => {
                    const syntheticSlot = { label: `Param ${i + 1}`, type: 'raw', idx: i };
                    renderParamSlot(bindingObj, syntheticSlot, paramsContainer);
                });
            } else {
                // Filter out optional BT index slot when the current command doesn't need it
                const activeSlots = slots.filter(s => {
                    if (!s.optional) return true;
                    const cmd = bindingObj.params?.[0]?.value;
                    return ENUM_OPTIONS['bt_cmd']?.indexed?.includes(cmd);
                });
                activeSlots.forEach(slot => renderParamSlot(bindingObj, slot, paramsContainer));
            }

            // ---- Enhancement 1: Decoration Editor ----
            // decoration.label, decoration.background, and decoration.color are visible in the
            // matrix display but were previously invisible and uneditable in the inspector.
            // Ghost Label rule (LLM2.txt §10): &trans keys must never carry a manual label override
            // since the editor looks down to Layer 0 at the same physical index to generate a
            // translucent ghost label automatically. Explicit overrides break this feature.
            const isTrans = behaviorVal === '&trans';
            const deco = bindingObj.decoration || {};
            const decoCard = document.createElement('div');
            decoCard.className = 'mt-6 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl shadow-sm dark:shadow-inner overflow-hidden';
            decoCard.innerHTML = `
                <button id="deco-toggle" class="w-full flex items-center justify-between px-6 py-4 text-left hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
                    <span class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest flex items-center gap-2">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"></path></svg>
                        Appearance
                    </span>
                    <span id="deco-badge" class="text-[9px] font-bold px-2 py-0.5 rounded-full ${Object.keys(deco).length > 0 ? 'bg-[color:var(--accent-soft)] text-[color:var(--accent)]' : 'bg-slate-100 dark:bg-slate-900 text-slate-400'}">${Object.keys(deco).length > 0 ? 'Custom' : 'Default'}</span>
                </button>
                <div id="deco-body" class="hidden px-6 pb-6 flex flex-col gap-4">

                    ${isTrans ? `
                    <div class="text-[11px] text-amber-600 dark:text-amber-400 bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-700 rounded-lg px-3 py-2.5 leading-relaxed">
                        <strong>Ghost Label active.</strong> &trans keys inherit their label from Layer 0 at this position — a manual label override would break that feature. To show something different, change the binding to something other than &trans.
                    </div>` : `
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-2">Label Override</label>
                        <div class="flex gap-2">
                            <input type="text" id="deco-label" class="input-field flex-1 font-mono" 
                                value="${deco.label || ''}" 
                                placeholder="${generateMatrixLabel(bindingObj) || 'auto'}">
                            <button id="deco-label-clear" title="Clear label override (use auto)" class="px-3 py-2 text-slate-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg border border-slate-200 dark:border-slate-700 transition-colors text-xs font-bold ${deco.label ? '' : 'opacity-30 cursor-default'}">✕</button>
                        </div>
                        <p class="text-[10px] text-slate-400 dark:text-slate-500 mt-1.5">Overrides the auto-generated matrix label. Leave empty to use auto.</p>
                    </div>`}

                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-2">Background Color</label>
                        <div class="flex gap-2 items-center">
                            <input type="color" id="deco-bg-picker" class="w-10 h-10 rounded-lg border border-slate-200 dark:border-slate-700 cursor-pointer bg-transparent p-0.5 shrink-0" value="${deco.background || '#1e293b'}">
                            <input type="text" id="deco-bg-hex" class="input-field font-mono flex-1" value="${deco.background || ''}" placeholder="#1e293b (default)">
                            <button id="deco-bg-clear" title="Clear background color" class="px-3 py-2 text-slate-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg border border-slate-200 dark:border-slate-700 transition-colors text-xs font-bold ${deco.background ? '' : 'opacity-30 cursor-default'}">✕</button>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-2">Text Color</label>
                        <div class="flex gap-2 items-center">
                            <input type="color" id="deco-fg-picker" class="w-10 h-10 rounded-lg border border-slate-200 dark:border-slate-700 cursor-pointer bg-transparent p-0.5 shrink-0" value="${deco.color || (deco.background ? getContrastColor(deco.background) : '#f8fafc')}">
                            <input type="text" id="deco-fg-hex" class="input-field font-mono flex-1" value="${deco.color || ''}" placeholder="auto-contrast">
                            <button id="deco-fg-clear" title="Clear text color (use auto-contrast)" class="px-3 py-2 text-slate-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg border border-slate-200 dark:border-slate-700 transition-colors text-xs font-bold ${deco.color ? '' : 'opacity-30 cursor-default'}">✕</button>
                        </div>
                        <p class="text-[10px] text-slate-400 dark:text-slate-500 mt-1.5">Leave empty to auto-calculate contrast against the background.</p>
                    </div>

                    ${Object.keys(deco).length > 0 ? `
                    <button id="deco-clear-all" class="text-[11px] font-bold text-red-500 hover:text-red-700 hover:bg-red-50 dark:hover:bg-red-900/20 border border-red-200 dark:border-red-800 py-2 rounded-lg transition-colors">
                        Remove All Appearance Overrides
                    </button>` : ''}
                </div>
            `;
            paramsContainer.appendChild(decoCard);

            // Toggle expand/collapse
            const decoBody = document.getElementById('deco-body');
            // Auto-open if there's existing decoration
            if (Object.keys(deco).length > 0) decoBody.classList.remove('hidden');
            document.getElementById('deco-toggle').onclick = () => decoBody.classList.toggle('hidden');

            const setDeco = (field, value) => {
                pushHistory();
                if (!bindingObj.decoration) bindingObj.decoration = {};
                if (value === null || value === '') {
                    delete bindingObj.decoration[field];
                    if (Object.keys(bindingObj.decoration).length === 0) delete bindingObj.decoration;
                } else {
                    bindingObj.decoration[field] = value;
                }
                renderAll();
            };

            if (!isTrans) {
                const labelInput = document.getElementById('deco-label');
                const labelClear = document.getElementById('deco-label-clear');
                labelInput.onchange = (e) => setDeco('label', e.target.value.trim() || null);
                labelClear.onclick = () => { if (deco.label) setDeco('label', null); };
            }

            // Background color — keep color picker and hex input in sync
            const bgPicker = document.getElementById('deco-bg-picker');
            const bgHex = document.getElementById('deco-bg-hex');
            const bgClear = document.getElementById('deco-bg-clear');
            bgPicker.oninput = (e) => { bgHex.value = e.target.value; };
            bgPicker.onchange = (e) => {
                const hex = e.target.value;
                bgHex.value = hex;
                // Auto-update text color to contrast if no manual override
                if (!bindingObj.decoration?.color) {
                    const fgPicker = document.getElementById('deco-fg-picker');
                    const fgHex = document.getElementById('deco-fg-hex');
                    const auto = getContrastColor(hex);
                    if (fgPicker) fgPicker.value = auto;
                    if (fgHex) fgHex.value = '';
                }
                setDeco('background', hex);
            };
            bgHex.onchange = (e) => {
                const hex = e.target.value.trim();
                if (/^#[0-9a-fA-F]{3,6}$/.test(hex)) { bgPicker.value = hex; setDeco('background', hex); }
                else if (!hex) setDeco('background', null);
            };
            bgClear.onclick = () => { if (deco.background) setDeco('background', null); };

            // Text color
            const fgPicker = document.getElementById('deco-fg-picker');
            const fgHex = document.getElementById('deco-fg-hex');
            const fgClear = document.getElementById('deco-fg-clear');
            fgPicker.oninput = (e) => { fgHex.value = e.target.value; };
            fgPicker.onchange = (e) => setDeco('color', e.target.value);
            fgHex.onchange = (e) => {
                const hex = e.target.value.trim();
                if (/^#[0-9a-fA-F]{3,6}$/.test(hex)) { fgPicker.value = hex; setDeco('color', hex); }
                else if (!hex) setDeco('color', null);
            };
            fgClear.onclick = () => { if (deco.color) setDeco('color', null); };

            // Clear all
            const clearAll = document.getElementById('deco-clear-all');
            if (clearAll) clearAll.onclick = () => {
                pushHistory();
                delete bindingObj.decoration;
                renderAll();
            };

            // ---- Enhancement 2a: Jump-to-Behavior ----
            // When the binding references a named custom behavior defined in this file
            // (holdTap, macro, modMorph, tapDance), show an inline summary of its most
            // important properties and a Jump button that navigates directly to it —
            // closing the disconnect between key-level editing and behavior-definition editing.
            const BEHAVIOR_GROUPS = {
                holdTaps: config.holdTaps || [],
                macros: config.macros || [],
                modMorphs: config.modMorphs || [],
                tapDances: config.tapDances || [],
            };
            let matchedGroup = null, matchedIndex = -1, matchedBehavior = null;
            for (const [grp, arr] of Object.entries(BEHAVIOR_GROUPS)) {
                const idx = arr.findIndex(b => b.name === behaviorVal);
                if (idx !== -1) { matchedGroup = grp; matchedIndex = idx; matchedBehavior = arr[idx]; break; }
            }

            if (matchedBehavior) {
                // Build a summary of the most useful properties inline
                const TIMING_LABELS = { tappingTermMs: 'Term', quickTapMs: 'Quick', requirePriorIdleMs: 'Idle', flavor: 'Flavor', waitMs: 'Wait', tapMs: 'Tap' };
                const summaryChips = Object.entries(TIMING_LABELS)
                    .filter(([k]) => matchedBehavior[k] !== undefined)
                    .map(([k, label]) => {
                        const v = matchedBehavior[k];
                        const display = typeof v === 'number' ? `${v}ms` : v;
                        return `<span class="inline-flex items-center gap-1 text-[10px] font-mono bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 px-2 py-1 rounded-md"><span class="text-slate-400">${label}</span><span class="text-slate-900 dark:text-white font-bold">${display}</span></span>`;
                    }).join('');

                const jumpCard = document.createElement('div');
                jumpCard.className = 'mt-4 bg-[color:var(--accent-soft)] border border-[color:var(--accent)] rounded-xl p-4';
                jumpCard.innerHTML = `
                    <div class="flex items-start justify-between gap-3 mb-3">
                        <div>
                            <div class="text-[9px] font-bold text-[color:var(--accent)] uppercase tracking-widest mb-0.5">Defined In ${T[termMode][matchedGroup] || matchedGroup}</div>
                            <div class="font-mono text-sm font-bold text-slate-900 dark:text-white">${matchedBehavior.name}</div>
                        </div>
                        <button id="btn-jump-behavior" class="shrink-0 flex items-center gap-1.5 bg-[color:var(--accent)] hover:brightness-110 text-white text-[11px] font-bold px-3 py-1.5 rounded-lg transition-all shadow-sm">
                            Edit
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
                        </button>
                    </div>
                    ${summaryChips ? `<div class="flex flex-wrap gap-1.5">${summaryChips}</div>` : '<div class="text-[10px] text-slate-400">No timing properties set.</div>'}
                `;
                paramsContainer.appendChild(jumpCard);

                document.getElementById('btn-jump-behavior').onclick = () => {
                    // Push the behavior's path onto inspectorPath so the breadcrumb trail reads:
                    // "Key 38 › &HRM_left_index_v1B_TKZ" and Back returns to the key.
                    inspectorPath.push({ type: 'behaviorList', group: matchedGroup });
                    inspectorPath.push({ type: 'behavior', group: matchedGroup, index: matchedIndex });
                    renderAll();
                };
            }
        }

        // --- 11. GENERIC BEHAVIOR ENGINE ---
        // Tier 5: Collect all behavior names that currently exist (user-created + built-in recognized ones)
        // so the validation engine can flag Custom bindings that reference something that doesn't exist.
        function getKnownBehaviorNames() {
            const known = new Set(Object.keys(BEHAVIOR_DEF));
            ['holdTaps','macros','modMorphs','tapDances'].forEach(g => {
                (config[g] || []).forEach(b => { if (b.name) known.add(b.name); });
            });
            // custom_defined_behaviors are raw devicetree text -- try to extract defined behavior names
            // from it by looking for the "name: label {" devicetree node pattern.
            const cdb = config.custom_defined_behaviors || '';
            const nameMatches = cdb.match(/^\s*\w+:/gm);
            if (nameMatches) nameMatches.forEach(m => known.add('&' + m.trim().replace(':', '')));
            return known;
        }

        function findInvalidCustomRefs(behavior) {
            const known = getKnownBehaviorNames();
            const invalid = [];
            function walk(obj) {
                if (!obj || typeof obj !== 'object') return;
                if (obj.value === 'Custom') {
                    const ref = obj.params?.[0]?.value;
                    if (ref && !known.has(ref)) invalid.push(ref);
                }
                (obj.params || []).forEach(walk);
                (obj.bindings || []).forEach(walk);
                if (obj.cases) obj.cases.forEach(c => walk(c.binding));
            }
            walk(behavior);
            if (behavior.binding) walk(behavior.binding);
            return invalid;
        }

        function renderBehaviorList(group) {
            els.inspContent.innerHTML = `
                <div class="flex gap-2 mb-4">
                    <button id="btn-create-beh" class="flex-1 bg-white dark:bg-slate-800 hover:border-[color:var(--accent)] border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white font-bold py-3 rounded-xl text-sm transition-all shadow-sm flex items-center justify-center gap-2">
                        <svg class="w-4 h-4 text-[color:var(--accent)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        New
                    </button>
                </div>
                <div class="mb-4 relative">
                    <input type="text" id="beh-search" placeholder="Filter by name…" class="input-field text-xs pl-8">
                    <svg class="w-4 h-4 absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
                <div id="beh-list-container" class="flex flex-col gap-3"></div>
            `;
            
            document.getElementById('btn-create-beh').onclick = () => {
                pushHistory();
                if (!config[group]) config[group] = [];
                let newItem = JSON.parse(JSON.stringify(SKELETONS[group]));
                newItem.name += `_${config[group].length}`;
                config[group].push(newItem);
                inspectorPath.push({ type: 'behavior', group: group, index: config[group].length - 1 });
                renderAll();
            };

            const arr = config[group] || [];
            const container = document.getElementById('beh-list-container');

            const renderFiltered = (filter) => {
                container.innerHTML = '';
                const filtered = arr.map((item, idx) => ({ item, idx })).filter(({ item }) =>
                    !filter || item.name?.toLowerCase().includes(filter.toLowerCase())
                );

                if (filtered.length === 0) {
                    container.innerHTML = `<div class="text-slate-500 text-sm italic text-center p-8 border border-dashed border-slate-300 dark:border-slate-700 rounded-xl">${filter ? 'No matches.' : 'No behaviors configured.'}</div>`;
                    return;
                }

                filtered.forEach(({ item, idx }) => {
                    const invalidRefs = findInvalidCustomRefs(item);
                    const hasWarning = invalidRefs.length > 0;

                    let card = document.createElement('div');
                    card.className = `bg-white dark:bg-slate-800 border rounded-xl p-4 group cursor-pointer transition-all shadow-sm ${hasWarning ? 'border-amber-400 dark:border-amber-600' : 'border-slate-200 dark:border-slate-700 hover:border-[color:var(--accent)]'}`;
                    card.innerHTML = `
                        <div class="flex justify-between items-start">
                            <span class="text-[color:var(--accent)] font-mono text-sm font-bold truncate flex-1 mr-2">${item.name}</span>
                            <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity shrink-0">
                                <button class="btn-clone text-slate-400 hover:text-[color:var(--accent)] hover:bg-[color:var(--accent-soft)] px-2 py-1 rounded text-[10px] font-bold" title="Clone">⎘ Clone</button>
                                <button class="btn-del text-slate-400 hover:text-white hover:bg-red-500 dark:hover:bg-red-600 px-2 py-1 rounded text-[10px] font-bold" title="Delete">✕</button>
                            </div>
                        </div>
                        ${hasWarning ? `<div class="mt-2 text-[10px] text-amber-600 dark:text-amber-400 flex items-start gap-1"><span>⚠</span><span>Unresolved Custom reference${invalidRefs.length > 1 ? 's' : ''}: <span class="font-mono">${invalidRefs.join(', ')}</span> — not found in defined behaviors or custom_defined_behaviors. This will likely fail ZMK compilation.</span></div>` : ''}
                    `;

                    card.onclick = (e) => {
                        if (e.target.classList.contains('btn-del') || e.target.classList.contains('btn-clone')) return;
                        inspectorPath.push({ type: 'behavior', group: group, index: idx }); renderAll();
                    };

                    card.querySelector('.btn-clone').onclick = () => {
                        pushHistory();
                        const cloned = JSON.parse(JSON.stringify(item));
                        cloned.name = item.name + '_copy';
                        config[group].push(cloned);
                        inspectorPath.push({ type: 'behavior', group: group, index: config[group].length - 1 });
                        renderAll();
                    };

                    card.querySelector('.btn-del').onclick = () => {
                        if (confirm(`Delete "${item.name}"?`)) { pushHistory(); config[group].splice(idx, 1); renderAll(); }
                    };
                    container.appendChild(card);
                });
            };

            renderFiltered('');
            document.getElementById('beh-search').oninput = (e) => renderFiltered(e.target.value);
        }

        function renderGenericBehaviorProperties(behavior, context) {
            let html = `
                <div class="mb-8 bg-white dark:bg-slate-800 p-6 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm dark:shadow-inner">
                    <label class="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-3">Behavior Name</label>
                    <input type="text" id="prop-name" class="input-field font-mono text-emerald-600 dark:text-emerald-400 font-bold" value="${behavior.name}">
                </div>
                <div id="dynamic-props" class="space-y-6 mb-8"></div>
                <div id="dynamic-slots" class="flex flex-col gap-2 relative"></div>
            `;
            els.inspContent.innerHTML = html;
            document.getElementById('prop-name').onchange = (e) => { if (e.target.value === behavior.name) return; pushHistory(); behavior.name = e.target.value; renderAll(); };

            const propsContainer = document.getElementById('dynamic-props');
            const slotsContainer = document.getElementById('dynamic-slots');

            // Optional properties relevant to this behavior group, that the user can opt into adding
            // even if the loaded/created behavior doesn't already have them set. Scoped per-group since
            // e.g. holdTriggerKeyPositions only makes sense on a hold-tap, not a tap-dance.
            const OPTIONAL_PROPS_BY_GROUP = {
                holdTaps: ['holdTriggerKeyPositions', 'holdTriggerOnRelease', 'retroTap'],
                combos: ['slowRelease'],
            };
            const optionalProps = (OPTIONAL_PROPS_BY_GROUP[context.group] || []).filter(k => !(k in behavior));

            // 1. Render Properties based on Generic Schema
            Object.keys(behavior).forEach(key => {
                const schema = PROPERTY_SCHEMA[key];
                if (!schema) return;

                let wrapper = document.createElement('div');
                wrapper.className = "bg-white dark:bg-slate-800 p-6 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm dark:shadow-inner";
                let labelText = T[termMode][key] || key;

                if (schema.type === 'slider') {
                    wrapper.innerHTML = `
                        <label class="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-4 flex items-center justify-between">
                            ${labelText}
                            <span id="prop-${key}-val" class="text-slate-900 dark:text-white font-mono bg-slate-100 dark:bg-slate-900 px-2 py-1 rounded border border-slate-200 dark:border-slate-700">${behavior[key]}ms</span>
                        </label>
                        <input type="range" id="prop-${key}" min="${schema.min}" max="${schema.max}" step="${schema.step}" value="${behavior[key]}">
                    `;
                } 
                else if (schema.type === 'select') {
                    let opts = schema.options.map(o => `<option value="${o}" ${behavior[key] === o ? 'selected' : ''}>${o}</option>`).join('');
                    wrapper.innerHTML = `
                        <label class="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-3">${labelText}</label>
                        <select id="prop-${key}" class="input-field cursor-pointer font-bold">${opts}</select>
                    `;
                }
                else if (schema.type === 'boolean') {
                    wrapper.innerHTML = `
                        <label class="flex items-center justify-between cursor-pointer">
                            <span class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest">${labelText}</span>
                            <input type="checkbox" id="prop-${key}" class="w-5 h-5 rounded cursor-pointer accent-[color:var(--accent)]" ${behavior[key] ? 'checked' : ''}>
                        </label>
                        <button class="prop-remove-btn text-[10px] text-slate-400 hover:text-red-500 mt-2" data-key="${key}">− Remove property</button>
                    `;
                }
                else if (schema.type === 'keyPositionList') {
                    wrapper.innerHTML = `
                        <label class="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-2">${labelText}</label>
                        <p class="text-[11px] text-slate-400 dark:text-slate-500 mb-3 leading-relaxed">Physical matrix indices, comma separated (e.g. the bilateral-combo opposite-hand keys this hold-tap should trigger against).</p>
                        <input type="text" id="prop-${key}" class="input-field font-mono" value="${(behavior[key] || []).join(', ')}" placeholder="0, 1, 2, 3">
                        <button class="prop-remove-btn text-[10px] text-slate-400 hover:text-red-500 mt-2" data-key="${key}">− Remove property</button>
                    `;
                }
                propsContainer.appendChild(wrapper);

                let el = document.getElementById(`prop-${key}`);
                if (schema.type === 'slider') {
                    el.oninput = (e) => document.getElementById(`prop-${key}-val`).textContent = e.target.value + 'ms';
                    el.onchange = (e) => { pushHistory(); behavior[key] = parseInt(e.target.value); renderAll(); };
                } else if (schema.type === 'boolean') {
                    el.onchange = (e) => { pushHistory(); behavior[key] = e.target.checked; renderAll(); };
                } else if (schema.type === 'keyPositionList') {
                    el.onchange = (e) => {
                        pushHistory();
                        behavior[key] = e.target.value.split(',').map(s => s.trim()).filter(s => s !== '').map(s => parseInt(s, 10)).filter(n => !isNaN(n));
                        renderAll();
                    };
                } else {
                    el.onchange = (e) => { pushHistory(); behavior[key] = e.target.value; renderAll(); };
                }

                const removeBtn = wrapper.querySelector('.prop-remove-btn');
                if (removeBtn) removeBtn.onclick = () => { pushHistory(); delete behavior[key]; renderAll(); };
            });

            // Affordance to opt into optional properties not currently present on this behavior
            if (optionalProps.length > 0) {
                let addPropWrapper = document.createElement('div');
                addPropWrapper.className = "flex flex-wrap gap-2";
                addPropWrapper.innerHTML = optionalProps.map(k => `<button class="prop-add-btn text-[11px] font-bold text-[color:var(--accent)] border border-dashed border-[color:var(--accent)] rounded-lg px-3 py-1.5 hover:bg-[var(--accent-soft)] transition-all" data-key="${k}">+ ${T[termMode][k] || k}</button>`).join('');
                propsContainer.appendChild(addPropWrapper);
                addPropWrapper.querySelectorAll('.prop-add-btn').forEach(b => {
                    b.onclick = () => {
                        pushHistory();
                        const k = b.dataset.key;
                        const schema = PROPERTY_SCHEMA[k];
                        behavior[k] = schema.type === 'boolean' ? false : (schema.type === 'keyPositionList' ? [] : '');
                        renderAll();
                    };
                });
            }

            // 2. Render Action Slots
            slotsContainer.insertAdjacentHTML('beforeend', `<label class="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-2 px-1 mt-4">Nested Actions</label>`);

            if (behavior.cases) { // Mod-Morph
                ['baseAction', 'shiftAction'].forEach((lblKey, i) => {
                    let b = behavior.cases[i].binding;
                    let btn = document.createElement('div');
                    btn.className = "bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-4 rounded-xl mb-2.5 cursor-pointer hover:border-[color:var(--accent)] transition-all flex justify-between items-center shadow-sm relative ml-5";
                    btn.innerHTML = `<div class="tree-line"></div><span class="text-xs font-bold text-slate-500 dark:text-slate-400">${T[termMode][lblKey]}</span> <span class="font-mono text-sm font-bold text-slate-900 dark:text-white bg-slate-50 dark:bg-slate-900 px-3 py-1.5 rounded border border-slate-200 dark:border-slate-700 shadow-sm">${getBeautifulLabel(b) || '&none'}</span>`;
                    btn.onclick = () => { inspectorPath.push({ type: 'binding', group: context.group, index: i }); renderAll(); };
                    slotsContainer.appendChild(btn);
                });

                let chips = ZMK_MODS.map(m => {
                    let isActive = behavior.cases[1].mods?.includes(m);
                    return `<button class="mod-chip ${isActive ? 'active' : ''}" data-val="${m}">${m.replace('MOD_', '')}</button>`;
                }).join('');
                slotsContainer.insertAdjacentHTML('beforeend', `
                    <div class="bg-white dark:bg-slate-800 p-6 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm dark:shadow-inner mt-4">
                        <label class="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-4">Trigger Modifiers</label>
                        <div class="grid grid-cols-4 gap-2" id="prop-mods-grid">${chips}</div>
                    </div>
                `);
                document.getElementById('prop-mods-grid').querySelectorAll('button').forEach(b => {
                    b.onclick = () => {
                        pushHistory();
                        let m = b.dataset.val;
                        if (!behavior.cases[1].mods) behavior.cases[1].mods = [];
                        let idx = behavior.cases[1].mods.indexOf(m);
                        if (idx > -1) behavior.cases[1].mods.splice(idx, 1); else behavior.cases[1].mods.push(m);
                        // keep-mods can only reference mods that are actually part of the trigger set;
                        // if a trigger mod was just removed, drop it from keepMods too so it never goes stale.
                        if (idx > -1 && behavior.cases[1].keepMods) {
                            const kIdx = behavior.cases[1].keepMods.indexOf(m);
                            if (kIdx > -1) behavior.cases[1].keepMods.splice(kIdx, 1);
                        }
                        renderAll();
                    };
                });

                // keep-mods: a subset of the trigger mods above that stays held while the "with mod"
                // binding fires. Only offered when there's at least one trigger mod selected.
                const triggerMods = behavior.cases[1].mods || [];
                if (triggerMods.length > 0) {
                    let keepChips = triggerMods.map(m => {
                        let isActive = behavior.cases[1].keepMods?.includes(m);
                        return `<button class="mod-chip ${isActive ? 'active' : ''}" data-val="${m}">${m.replace('MOD_', '')}</button>`;
                    }).join('');
                    slotsContainer.insertAdjacentHTML('beforeend', `
                        <div class="bg-white dark:bg-slate-800 p-6 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm dark:shadow-inner mt-4">
                            <label class="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-2">${T[termMode].keepMods}</label>
                            <p class="text-[11px] text-slate-400 dark:text-slate-500 mb-4 leading-relaxed">Selected modifiers stay held even while the morphed (shifted) key is sent.</p>
                            <div class="grid grid-cols-4 gap-2" id="prop-keepmods-grid">${keepChips}</div>
                        </div>
                    `);
                    document.getElementById('prop-keepmods-grid').querySelectorAll('button').forEach(b => {
                        b.onclick = () => {
                            pushHistory();
                            let m = b.dataset.val;
                            if (!behavior.cases[1].keepMods) behavior.cases[1].keepMods = [];
                            let idx = behavior.cases[1].keepMods.indexOf(m);
                            if (idx > -1) behavior.cases[1].keepMods.splice(idx, 1); else behavior.cases[1].keepMods.push(m);
                            renderAll();
                        };
                    });
                }
            }
            else if (behavior.bindings) { // Hold-Taps, Macros, Tap-Dances
                if (context.group === 'holdTaps') {
                    ['holdAction', 'tapAction'].forEach((lblKey, i) => {
                        // holdTaps[].bindings entries are always plain behavior-class strings
                        // (e.g. "&kp", "&mo") in MoErgo's real schema -- display directly,
                        // never mutate into an object just to render a label.
                        let slotVal = typeof behavior.bindings[i] === 'string' ? behavior.bindings[i] : (behavior.bindings[i]?.value || '&kp');
                        let btn = document.createElement('div');
                        btn.className = "bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-4 rounded-xl mb-2.5 cursor-pointer hover:border-[color:var(--accent)] transition-all flex justify-between items-center shadow-sm relative ml-5";
                        btn.innerHTML = `<div class="tree-line"></div><span class="text-xs font-bold text-slate-500 dark:text-slate-400">${T[termMode][lblKey]}</span> <span class="font-mono text-sm font-bold text-slate-900 dark:text-white bg-slate-50 dark:bg-slate-900 px-3 py-1.5 rounded border border-slate-200 dark:border-slate-700 shadow-sm">${slotVal || '&none'}</span>`;
                        btn.onclick = () => { inspectorPath.push({ type: 'binding', group: context.group, index: i }); renderAll(); };
                        slotsContainer.appendChild(btn);
                    });
                } else {
                    behavior.bindings.forEach((b, i) => {
                        let btn = document.createElement('div');
                        btn.className = "bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-4 rounded-xl mb-2.5 cursor-pointer hover:border-[color:var(--accent)] transition-all flex justify-between items-center shadow-sm group relative ml-5";
                        let stepLabel = termMode === 'friendly' ? `Step ${i+1}` : `[${i}]`;
                        btn.innerHTML = `
                            <div class="tree-line"></div>
                            <div class="flex items-center gap-3">
                                <span class="text-[10px] font-bold text-sky-600 dark:text-sky-400 bg-sky-50 dark:bg-sky-900/30 border border-sky-200 dark:border-sky-800 px-2 py-1 rounded uppercase tracking-wider shadow-sm">${stepLabel}</span> 
                                <span class="font-mono text-sm font-bold text-slate-900 dark:text-white">${getBeautifulLabel(b) || '&none'}</span>
                            </div>
                            <button class="text-slate-400 hover:text-white hover:bg-red-500 dark:hover:bg-red-600 px-3 py-1.5 rounded-lg text-xs opacity-0 group-hover:opacity-100 transition-all font-bold btn-del-step">Del</button>
                        `;
                        btn.onclick = (e) => { 
                            if(e.target.classList.contains('btn-del-step')) return;
                            inspectorPath.push({ type: 'binding', group: context.group, index: i }); renderAll(); 
                        };
                        btn.querySelector('.btn-del-step').onclick = () => { pushHistory(); behavior.bindings.splice(i, 1); renderAll(); };
                        slotsContainer.appendChild(btn);
                    });

                    let addBtn = document.createElement('button');
                    addBtn.className = "w-full py-4 mt-2 border-2 border-dashed border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 text-slate-500 dark:text-slate-400 text-sm font-bold rounded-xl hover:border-[color:var(--accent)] hover:text-[color:var(--accent)] transition-all shadow-sm";
                    addBtn.textContent = "+ Add Sequence Step";
                    addBtn.onclick = () => { pushHistory(); behavior.bindings.push({value: "&none"}); renderAll(); };
                    slotsContainer.appendChild(addBtn);
                }
            }
            else if (context.group === 'combos') {
                let btn = document.createElement('div');
                btn.className = "bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-4 rounded-xl mb-2.5 cursor-pointer hover:border-[color:var(--accent)] transition-all flex justify-between items-center shadow-sm relative ml-5";
                btn.innerHTML = `<div class="tree-line"></div><span class="text-xs font-bold text-slate-500 dark:text-slate-400">Combo Binding</span> <span class="font-mono text-sm font-bold text-slate-900 dark:text-white bg-slate-50 dark:bg-slate-900 px-3 py-1.5 rounded border border-slate-200 dark:border-slate-700 shadow-sm">${getBeautifulLabel(behavior.binding) || '&none'}</span>`;
                btn.onclick = () => { inspectorPath.push({ type: 'binding', group: context.group, index: 0 }); renderAll(); };
                slotsContainer.appendChild(btn);
            }
        }

        // Boot UI
        document.getElementById('empty-state').classList.remove('hidden');
    </script>
</body>
</html>
